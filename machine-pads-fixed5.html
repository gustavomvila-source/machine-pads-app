// ─────────────────────────────────────────────
// COLUMN RESOLUTION
// Maps various real-world column name variations → canonical internal names

const COLUMN_ALIASES = {
  // NCM: "NCM Classificação Fiscal", "NCM", "ncm_fiscal" etc → "ncm"

};

function resolveColumnName(raw) {
  // 1. Normalize the key
  const nk = String(raw)
    .toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_|_$/g, "");
  // 2. Direct match
  if (COLUMN_ALIASES[nk]) return COLUMN_ALIASES[nk];
  // 3. Prefix match (e.g. "ncm_classificacao_fiscal" starts with "ncm")
  for (const [alias, canonical] of Object.entries(COLUMN_ALIASES)) {
    if (nk.startsWith(alias + "_") || nk === alias) return canonical;
  }
  return nk;
}

// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────
function normalizeKey(key) {
  return String(key)
    .toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_|_$/g, "");
}

// Cleans values that Excel stores as floats (e.g. EAN: 7893946001234.0 → "7893946001234")
function cleanNumericString(val) {
  if (val === null || val === undefined || val === "") return "";
  const s = String(val).trim();
  if (/^\d+\.0+$/.test(s)) return String(Math.round(parseFloat(s)));
  return s;
}

// ─────────────────────────────────────────────

function mapOrigem(origem) {
  const o = (origem || "").toLowerCase().trim();
  if (o.includes("import") || o.includes("estrang"))
    return "2 - Estrangeira - Adquirida no mercado interno, exceto a indicada no código 7";
  return "0 - Nacional, exceto as indicadas nos códigos 3 a 5";
}

function mapGarantia(val) {
  if (!val) return "";
  const num = String(val).replace(/\D/g, "");
  return num ? `${num} meses` : String(val);
}

// After all products are enriched, resolve V→K parent/child relationships
function resolveParentChild(products) {
  const vProds = products.filter(p => (p.tipo_de_produto || "S").toUpperCase() === "V");

  // Step 1: set _codigoPai on each K product
  let resolved = products.map(p => {
    if ((p.tipo_de_produto || "S").toUpperCase() !== "K") return p;
    const kSku = (p.enriched?.sku_interno || "").toUpperCase();
    const kName = (p.produto_fornecedor || "").toLowerCase()
      .replace(/\s*[-–]\s*(110v|220v|127v|220|110|127|bivolt)\s*$/i, "").trim();

    let parent = null;
    // Match by SKU prefix
    for (const v of vProds) {
      const vSku = (v.enriched?.sku_interno || "").toUpperCase();
      if (vSku && kSku.startsWith(vSku + "-")) { parent = v; break; }
    }
    // Fallback: match by product name similarity
    if (!parent) {
      for (const v of vProds) {
        const vName = (v.produto_fornecedor || "").toLowerCase()
          .replace(/\s*[-–]\s*(110v|220v|127v|220|110|127|bivolt)\s*$/i, "").trim();
        if (vName.length > 5 && kName.includes(vName.substring(0, Math.min(vName.length, 25)))) {
          parent = v; break;
        }
      }
    }
    return { ...p, _codigoPai: parent !== null ? (parent.enriched?.sku_interno || parent.codigo_fornecedor || "") : null }; // v24
  });

  // Step 2: update V products' variacoes based on their K children
  resolved = resolved.map(p => {
    if ((p.tipo_de_produto || "S").toUpperCase() !== "V") return p;
    const vSku = p.enriched?.sku_interno || "";
    const children = resolved.filter(c => c._codigoPai === vSku);
    if (!children.length) return p;
    const varMap = {};
    children.forEach(c => {
      (c.enriched?.variacoes || "").split(";").forEach(part => {
        const [name, val] = part.split(":").map(s => s.trim());
        if (name && val) {
          if (!varMap[name]) varMap[name] = [];
          if (!varMap[name].includes(val)) varMap[name].push(val);
        }
      });
    });
    const variacoes = Object.entries(varMap).map(([n, vs]) => `${n}: ${vs.join(",")}`).join(";");
    return { ...p, enriched: { ...p.enriched, variacoes } };
  });

  return resolved;
}

function buildTinyCSV(products) {
  const escape = (val) => {
    const s = String(val ?? "");
    return (s.includes(",") || s.includes("\n") || s.includes('"'))
      ? `"${s.replace(/"/g, '""')}"`
      : s;
  };
  const rows = [TINY_HEADERS, ...products.map(buildTinyRow)];
  return rows.map(r => r.map(escape).join(",")).join("\n");
}

function downloadCSV(content, filename) {
  const bom = "﻿"; // UTF-8 BOM for Excel compatibility
  const blob = new Blob([bom + content], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function parseNumber(val) {
  if (val === null || val === undefined || val === "") return null;
  let s = String(val).trim();
  if (!s) return null;
  // Strip currency symbols, spaces and Excel error strings (#VALUE!, etc.)
  if (s.startsWith("#")) return null;
  s = s.replace(/[R$\s]/g, "");
  if (!s) return null;
  // Brazilian format "1.234,56" → has both period (thousands) and comma (decimal)
  if (s.includes(",") && s.includes(".")) {
    s = s.replace(/\./g, "").replace(",", ".");        // "1.234,56" → "1234.56"
  } else if (s.includes(",") && !s.includes(".")) {
    s = s.replace(",", ".");                            // "1234,56"  → "1234.56"
  }
  // Remove any remaining non-numeric characters except period and minus
  s = s.replace(/[^0-9.\-]/g, "");
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function isValidEAN(val) {
  const s = String(val).replace(/\D/g, "");
  return s.length === 8 || s.length === 13;
}

function isValidNCM(val) {
  const s = String(val).replace(/\D/g, "");
  return s.length === 8;
}

function isValidPrice(val) {
  return parseNumber(val) !== null;
}

function validateProduct(p) {
  const errors = [];
  const tipo = (p.tipo_de_produto || "S").toUpperCase();
  const isV = tipo === "V";

  for (const f of REQUIRED_FIELDS) {
    // EAN é opcional para produtos do tipo V (produto pai com variações)
    if (f === "ean" && isV) continue;
    if (!p[f] && p[f] !== 0) errors.push({ field: f, msg: `${FIELD_LABELS[f]} é obrigatório` });
  }
  if (p.ean && !isValidEAN(p.ean)) errors.push({ field: "ean", msg: `EAN deve ter 8 ou 13 dígitos numéricos (recebido: "${p.ean}")` });
  if (p.ncm && !isValidNCM(p.ncm)) errors.push({ field: "ncm", msg: `NCM deve ter 8 dígitos numéricos (recebido: "${p.ncm}")` });
  if (p.preco_venda && !isValidPrice(p.preco_venda)) errors.push({ field: "preco_venda", msg: `Preço deve ser um número válido (recebido: "${p.preco_venda}")` });
  return errors;
}

async function enrichProductWithAI(product, apiKey, rules = {}, onPhase) {
  const {

    corsProxy = "",
  } = rules;
  const apiBase = corsProxy ? `${corsProxy}https://api.openai.com` : "https://api.openai.com";

  // ── STEP 1: Web research + CEST lookup ──────────────────────────────────
  onPhase?.("Pesquisando na web...");
  let webContext = "";
  try {
    const searchPrompt = `Produto: "${product.produto_fornecedor}" | Marca: "${product.marca || "—"}" | NCM: ${product.ncm}

TAREFA 1 — CEST:
Pesquise o código CEST para o NCM ${product.ncm} no Convênio ICMS 142/2018. Faça uma busca detalhada:
1. Pesquise "NCM ${product.ncm} CEST" e "${product.ncm} substituição tributária ICMS"
2. Consulte legisweb.com.br, portaltributario.com.br, sites de consultoria fiscal e tabelas CEST do CONFAZ
3. Se encontrar o CEST exato para este NCM, retorne "CEST: XX.XXX.XX"
4. Se não encontrar o exato, identifique o segmento do produto na tabela CEST e retorne o código do segmento mais próximo: "CEST: XX.XXX.XX"
5. NUNCA retorne "NÃO ENCONTRADO" — sempre forneça o melhor código CEST possível para este tipo de produto/NCM

TAREFA 2 — ESPECIFICAÇÕES TÉCNICAS:
Busque a ficha técnica completa deste produto: potência (W), tensão (V/bivolt), velocidade (RPM), capacidade, dimensões (mm), peso (kg), disco/acessório incluído, classe de proteção (IP), certificações (INMETRO, CE, UL), aplicações recomendadas, tipo de motor, características de segurança.

TAREFA 3 — SEO E MERCADO:
Identifique as 10 principais palavras-chave que consumidores brasileiros usam para buscar este produto no Mercado Livre, Amazon BR e Shopee. Inclua variações com voltagem, aplicação e marca.

Retorne as três seções claramente separadas.`;
    const res1 = await fetch(`${apiBase}/v1/chat/completions`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: "gpt-4o-search-preview",
        // Note: gpt-4o-search-preview does NOT support temperature — omit it
        messages: [{ role: "user", content: searchPrompt }],
      }),
    });
    if (res1.ok) {
      const d1 = await res1.json();
      webContext = d1.choices[0]?.message?.content || "";
    }
    // If not ok, silently fall through to step 2 with empty webContext
  } catch (_) {
    // web research failed — proceed with data-only enrichment
  }
  const cestFromWeb = (webContext.match(/\b\d{2}\.\d{3}\.\d{2}\b/) || [])[0] || "";


  // ── STEP 2: Structured generation (JSON mode) ───────────────────────────
  onPhase?.("Gerando conteúdo...");

  const titleInstruction = titleTemplate
    ? `Siga EXATAMENTE este padrão: "${titleTemplate}". Substitua cada variável ({Marca}, {Produto}, {Potência}, {Tensão}, etc.) pelo valor extraído dos dados. Omita variáveis que não se aplicam. Máx 60 chars.`
    : `Crie o título-mestre do produto (campo "Descrição" no Tiny ERP, base para anúncios em marketplaces).
   ESTRUTURA: [Tipo do produto] [Especificação principal] [Modelo/Referência] [Marca]
   Exemplos: "Parafusadeira/Furadeira 20V 1/2pol PFV120 Vonder" | "Serra Mármore 1400W 110mm SM1400 Vonder" | "Esmerilhadeira Angular 9pol 2200W GWS2200 Bosch"

// ─── OAuth2 PKCE helpers (Tiny ERP) ─────────────────────────────────────────
async function generatePKCE() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  const verifier = btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  const challenge = btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  return { verifier, challenge };
}

function initiateTinyOAuth(clientId, corsProxy) {
  generatePKCE().then(({ verifier, challenge }) => {
    sessionStorage.setItem('pkce_verifier', verifier);
    sessionStorage.setItem('oauth_client_id', clientId);
    const redirectUri = window.location.href.split('?')[0].split('#')[0];
    const url = `https://accounts.tiny.com.br/realms/tiny/protocol/openid-connect/auth?` +
      `client_id=${encodeURIComponent(clientId)}&redirect_uri=${encodeURIComponent(redirectUri)}&` +
      `scope=openid&response_type=code&code_challenge=${challenge}&code_challenge_method=S256`;
    window.location.href = url;
  });
}

async function exchangeTinyCode(code, clientId, clientSecret, corsProxy) {
  const redirectUri = window.location.href.split('?')[0].split('#')[0];
  const verifier = sessionStorage.getItem('pkce_verifier') || '';
  const base = corsProxy ? `${corsProxy}https://accounts.tiny.com.br` : 'https://accounts.tiny.com.br';
  const resp = await fetch(`${base}/realms/tiny/protocol/openid-connect/token`, {
    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ grant_type: 'authorization_code', client_id: clientId,
      client_secret: clientSecret, redirect_uri: redirectUri, code, code_verifier: verifier })
  });
  if (!resp.ok) { const t = await resp.text(); throw new Error(`${resp.status}: ${t}`); }
  return resp.json();
}

async function refreshTinyTokenFn(refreshToken, clientId, clientSecret, corsProxy) {
  const base = corsProxy ? `${corsProxy}https://accounts.tiny.com.br` : 'https://accounts.tiny.com.br';
  const resp = await fetch(`${base}/realms/tiny/protocol/openid-connect/token`, {
    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ grant_type: 'refresh_token', client_id: clientId,
      client_secret: clientSecret, refresh_token: refreshToken })
  });
  if (!resp.ok) throw new Error(`Refresh failed: ${resp.status}`);
  return resp.json();
}

    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { const d = JSON.parse(xhr.responseText);
          resolve(d?.itens || d?.retorno?.itens || []);
        } catch (_) { resolve([]); }
      } else resolve([]);
    };
    xhr.onerror = () => resolve([]);
    xhr.send();
  });
}

// ─────────────────────────────────────────────
// CSV PARSER
// Custom RFC-4180 CSV parser that:
//   - Always uses comma as delimiter (no auto-detection)
//   - Handles quoted fields with embedded commas/newlines
//   - Preserves tabs inside field names (e.g. "Unidade\tPreco_venda")
//   - Returns plain objects (header row → keys, data rows → values)
// ─────────────────────────────────────────────
function parseCSVText(text) {
  // Remove UTF-8 BOM if present
  const s = text.replace(/^﻿/, "");

  // Parse all records into arrays of strings
  const records = [];
  let i = 0;

  while (i < s.length) {
    const fields = [];
    // Read each field in the current row
    while (true) {
      let val = "";
      if (s[i] === '"') {
        // Quoted field
        i++; // skip opening quote
        while (i < s.length) {
          if (s[i] === '"' && s[i + 1] === '"') { val += '"'; i += 2; }
          else if (s[i] === '"') { i++; break; }  // closing quote
          else { val += s[i++]; }
        }
      } else {
        // Unquoted field: read until comma or end-of-record
        while (i < s.length && s[i] !== "," && s[i] !== "\r" && s[i] !== "\n") {
          val += s[i++];
        }
      }
      fields.push(val);
      if (i < s.length && s[i] === ",") { i++; continue; } // next field
      break; // end of record
    }
    // Skip \r\n or \n
    if (i < s.length && s[i] === "\r") i++;
    if (i < s.length && s[i] === "\n") i++;

    // Keep record if at least one field is non-empty
    if (fields.some(f => f.trim() !== "")) records.push(fields);
  }

  if (records.length < 2) return [];
  const headers = records[0];
  return records.slice(1).map(vals => {
    const obj = {};
    headers.forEach((h, j) => { obj[h] = vals[j] ?? ""; });
    return obj;
  });
}

// ─────────────────────────────────────────────
// UPLOAD STEP
// ─────────────────────────────────────────────
function UploadStep({ onUpload }) {
  const [dragging, setDragging] = useState(false);
  const [error, setError] = useState("");
  const inputRef = useRef(null);

  const processFile = useCallback(async (file) => {
    setError("");
    const ext = file.name.split(".").pop().toLowerCase();
    if (!["xlsx", "xls", "csv"].includes(ext)) {
      setError("Formato não suportado. Use Excel (.xlsx, .xls) ou CSV."); return;
    }
    try {
      let rawRows;

      if (ext === "csv") {
        // ── CSV: read as text (proper UTF-8 decode) then parse manually.
        // Avoids SheetJS binary→string encoding issues that garble accented chars
        // (e.g. "Preço de Venda" decoded as Latin-1 → "PreÃ§o de Venda").
        const text = await file.text();
        rawRows = parseCSVText(text);
      } else {
        // ── XLSX / XLS: SheetJS binary read
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        rawRows = XLSX.utils.sheet_to_json(ws, { raw: false, defval: "" });
      }

      if (!rawRows.length) { setError("Arquivo sem dados reconhecíveis."); return; }

      // Build column map: original header → canonical name (for diagnostics)
      const columnMap = {};
      if (rawRows[0]) {
        Object.keys(rawRows[0]).forEach(k => { columnMap[k] = resolveColumnName(k); });
      }

      const normalized = rawRows.map(row => {
        const r = {};
        Object.entries(row).forEach(([k, v]) => {
          const canonical = resolveColumnName(k);
          let val = String(v ?? "").trim();
          if (canonical === "ean" || canonical === "ncm") val = cleanNumericString(val);
          // Don't overwrite an already-set non-empty value with an empty one.
          // Prevents a secondary column with the same canonical name from wiping a valid value.
          if (val !== "" || r[canonical] === undefined) {
            r[canonical] = val;
          }
        });
        return r;
      });
      // Filter out completely empty rows (trailing blank lines in CSV)
      const nonEmpty = normalized.filter(r => Object.values(r).some(v => String(v).trim() !== ""));
      onUpload(nonEmpty, columnMap);
    } catch (err) {
      setError("Erro ao ler o arquivo. Verifique se está no formato correto.");
    }
  }, [onUpload]);

  return (
    <div className="max-w-lg mx-auto">
      <div className="text-center mb-8">
        <div className="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <Package size={32} className="text-indigo-600" />
        </div>
        <h1 className="text-2xl font-bold text-gray-900">Cadastro Massivo de Produtos</h1>
        <p className="text-gray-500 mt-1.5 text-sm">Faça upload da planilha para iniciar o processo de enriquecimento</p>
      </div>
      <div
        onClick={() => inputRef.current?.click()}
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={e => { e.preventDefault(); setDragging(false); const f = e.dataTransfer.files[0]; if (f) processFile(f); }}
        className={`border-2 border-dashed rounded-2xl p-12 text-center cursor-pointer transition-all
          ${dragging ? "border-indigo-500 bg-indigo-50 scale-[1.01]" : "border-gray-300 hover:border-indigo-400 hover:bg-gray-50"}`}
      >
        <Upload size={36} className={`mx-auto mb-3 ${dragging ? "text-indigo-500" : "text-gray-400"}`} />
        <p className="font-semibold text-gray-700">Arraste o arquivo aqui ou clique para selecionar</p>
        <p className="text-sm text-gray-400 mt-1">Excel (.xlsx, .xls) ou CSV</p>
        <input ref={inputRef} type="file" className="hidden" accept=".xlsx,.xls,.csv" onChange={e => { if (e.target.files[0]) processFile(e.target.files[0]); }} />
      </div>
      {error && (
        <div className="mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm flex items-center gap-2">
          <XCircle size={16} className="shrink-0" /> {error}
        </div>
      )}
      <div className="mt-5 p-4 bg-gray-50 rounded-xl">
        <p className="text-xs font-semibold text-gray-600 mb-2">📋 Colunas esperadas na planilha</p>
        <p className="text-xs text-gray-400 leading-relaxed">EAN · Produto_fornecedor · Codigo_fornecedor · Marca · Fornecedor · Origem · NCM · Classificação_Fiscal · Cubagem · Peso · Altura · Largura · Comprimento · Link_imagens_drive · Link_benchmark · Categoria_sugerida · Observacoes · <strong>Status</strong> · Unidade · Preco_venda · Garantia</p>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// VALIDATION STEP
// ─────────────────────────────────────────────
function ValidationStep({ raw, columnMap, onProceed, onBack }) {
  const valid = [], blocked = [], ignored = [];
  for (const p of raw) {
    const status = (p.status || "").toLowerCase().trim();
    if (status !== "pronto") { ignored.push({ ...p, _reason: `Status: "${p.status || "(vazio)"}"` }); continue; }
    const errs = validateProduct(p);
    if (errs.length) blocked.push({ ...p, _errors: errs });
    else valid.push(p);
  }

  const [tab, setTab] = useState("valid");
  const [expanded, setExpanded] = useState(null);
  const [showColMap, setShowColMap] = useState(false);

  // Identify required fields that are completely absent from the column mapping
  const mappedCanonicals = new Set(Object.values(columnMap || {}));
  const missingRequired = REQUIRED_FIELDS.filter(f => !mappedCanonicals.has(f));

  const TABS = [
    { id: "valid", label: "Válidos", count: valid.length, color: "green", Icon: CheckCircle },
    { id: "blocked", label: "Bloqueados", count: blocked.length, color: "red", Icon: XCircle },
    { id: "ignored", label: "Ignorados", count: ignored.length, color: "gray", Icon: AlertCircle },
  ];
  const activeList = tab === "valid" ? valid : tab === "blocked" ? blocked : ignored;

  return (
    <div>
      <div className="text-center mb-6">
        <h2 className="text-xl font-bold text-gray-900">Validação dos Produtos</h2>
        <p className="text-gray-500 text-sm mt-1">{raw.length} linhas lidas da planilha</p>
      </div>

      {/* Column mapping diagnostics */}
      {Object.keys(columnMap || {}).length > 0 && (
        <div className="mb-4">
          {missingRequired.length > 0 && (
            <div className="p-3 mb-2 bg-red-50 border border-red-200 rounded-xl text-xs text-red-700 flex items-start gap-2">
              <AlertCircle size={13} className="shrink-0 mt-0.5" />
              <span>
                <strong>Colunas obrigatórias não encontradas na planilha:</strong>{" "}
                {missingRequired.map(f => FIELD_LABELS[f] || f).join(", ")}.
                {" "}Verifique os nomes das colunas.
              </span>
            </div>
          )}
          <button onClick={() => setShowColMap(v => !v)}
            className="text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1 transition-colors">
            {showColMap ? "▲" : "▼"} Diagnóstico de colunas detectadas ({Object.keys(columnMap).length} colunas)
          </button>
          {showColMap && (
            <div className="mt-2 p-3 bg-gray-50 border border-gray-200 rounded-xl text-xs max-h-40 overflow-y-auto">
              <div className="grid grid-cols-1 gap-0.5">
                {Object.entries(columnMap).map(([orig, canon]) => {
                  const isRequired = REQUIRED_FIELDS.includes(canon);
                  return (
                    <div key={orig} className="flex gap-2 items-center">
                      <span className="text-gray-400 font-mono truncate max-w-[180px]" title={orig}>"{orig}"</span>
                      <span className="text-gray-400">→</span>
                      <span className={`font-mono font-semibold ${isRequired ? "text-indigo-600" : "text-gray-500"}`}>{canon}</span>
                      {isRequired && <span className="text-indigo-400 text-[10px]">✓ obrigatório</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      <div className="grid grid-cols-3 gap-3 mb-5">
        {TABS.map(({ id, label, count, color, Icon }) => (
          <button key={id} onClick={() => { setTab(id); setExpanded(null); }}
            className={`p-4 rounded-2xl border-2 text-left transition-all
              ${tab === id
                ? color === "green" ? "border-green-500 bg-green-50"
                  : color === "red" ? "border-red-500 bg-red-50"
                  : "border-gray-400 bg-gray-50"
                : "border-gray-200 hover:border-gray-300 bg-white"}`}>
            <div className={`flex items-center gap-1.5 mb-1 text-xs font-semibold
              ${color === "green" ? "text-green-600" : color === "red" ? "text-red-600" : "text-gray-500"}`}>
              <Icon size={12} /> {label}
            </div>
            <div className={`text-3xl font-bold ${color === "green" ? "text-green-600" : color === "red" ? "text-red-600" : "text-gray-500"}`}>{count}</div>
          </button>
        ))}
      </div>

      <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden mb-5">
        <div className="overflow-x-auto max-h-60">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 sticky top-0 z-10">
              <tr>
                <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">EAN</th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Produto</th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Marca</th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">
                  {tab === "blocked" ? "Problemas" : tab === "ignored" ? "Motivo" : "Status"}
                </th>
              </tr>
            </thead>
            <tbody>
              {activeList.length === 0 ? (
                <tr><td colSpan={4} className="text-center py-10 text-gray-400 text-sm">Nenhum produto nessa categoria</td></tr>
              ) : activeList.flatMap((p, i) => {
                const rows = [
                  <tr key={`r${i}`}
                    className={`border-t border-gray-100 transition-colors ${tab === "blocked" ? "cursor-pointer hover:bg-red-50" : ""}`}
                    onClick={() => tab === "blocked" && setExpanded(expanded === i ? null : i)}>
                    <td className="px-4 py-3 font-mono text-xs text-gray-500">{p.ean || "—"}</td>
                    <td className="px-4 py-3 font-medium text-gray-800 max-w-[200px] truncate">{p.produto_fornecedor || "—"}</td>
                    <td className="px-4 py-3 text-gray-500 text-xs">{p.marca || "—"}</td>
                    <td className="px-4 py-3">
                      {tab === "blocked" && (
                        <span className="inline-flex items-center gap-1 text-red-600 text-xs font-medium">
                          <XCircle size={12} /> {p._errors.length} erro(s) {expanded === i ? "▲" : "▼"}
                        </span>
                      )}
                      {tab === "ignored" && <span className="text-gray-400 text-xs">{p._reason}</span>}
                      {tab === "valid" && <span className="inline-flex items-center gap-1 text-green-600 text-xs"><CheckCircle size={12} /> Pronto</span>}
                    </td>
                  </tr>
                ];
                if (tab === "blocked" && expanded === i) {
                  rows.push(
                    <tr key={`d${i}`} className="bg-red-50 border-t border-red-100">
                      <td colSpan={4} className="px-6 py-4">
                        {/* Errors */}
                        <ul className="space-y-1 mb-3">
                          {p._errors.map((e, j) => (
                            <li key={j} className="text-xs text-red-700 flex items-start gap-1.5">
                              <AlertCircle size={11} className="shrink-0 mt-0.5" />
                              <span><span className="font-semibold">{FIELD_LABELS[e.field] || e.field}:</span> {e.msg}</span>
                            </li>
                          ))}
                        </ul>
                        {/* Debug: raw values received for all required fields */}
                        <div className="border-t border-red-200 pt-2">
                          <p className="text-xs font-semibold text-red-500 mb-1.5">🔍 Valores lidos da planilha:</p>
                          <div className="grid grid-cols-2 gap-x-4 gap-y-0.5">
                            {REQUIRED_FIELDS.map(f => (
                              <div key={f} className="text-xs flex gap-1">
                                <span className="text-red-500 font-medium w-24 shrink-0">{FIELD_LABELS[f] || f}:</span>
                                <span className={`font-mono ${p[f] ? "text-gray-700" : "text-red-400 italic"}`}>
                                  {p[f] ? `"${p[f]}"` : "(vazio)"}
                                </span>
                              </div>
                            ))}
                          </div>
                        </div>
                      </td>
                    </tr>
                  );
                }
                return rows;
              })}
            </tbody>
          </table>
        </div>
      </div>

      <div className="flex gap-3 mt-2">
        <button onClick={onBack}
          className="px-5 py-3.5 border border-gray-300 rounded-2xl text-sm font-medium hover:bg-gray-50 flex items-center gap-1.5 transition-colors shrink-0">
          <ChevronLeft size={16} /> Voltar
        </button>
        {valid.length > 0 ? (
          <button onClick={() => onProceed(valid)}
            className="flex-1 py-3.5 bg-indigo-600 text-white rounded-2xl font-semibold hover:bg-indigo-700 flex items-center justify-center gap-2 transition-colors shadow-md shadow-indigo-200">
            Prosseguir com {valid.length} produto(s) válido(s) <ChevronRight size={18} />
          </button>
        ) : (
          <div className="flex-1 flex items-center justify-center py-3.5 bg-gray-50 rounded-2xl text-gray-500 text-sm text-center px-4">
            Nenhum produto válido. Corrija os erros e volte.
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// ENRICHMENT STEP
// ─────────────────────────────────────────────
function EnrichmentStep({ products, apiKey, rules, onDone, onBack }) {
  const [results, setResults] = useState([]);
  const [current, setCurrent] = useState(-1);
  const [phase, setPhase] = useState("");
  const [started, setStarted] = useState(false);
  const [running, setRunning] = useState(false);
  const [expandedErr, setExpandedErr] = useState(null);

  // Run enrichment for a list of (product, index) pairs, merging into existing results
  const runBatch = async (batch, existingResults) => {
    setRunning(true);
    const acc = [...existingResults];
    for (const { product, idx } of batch) {
      setCurrent(idx);
      setPhase("");
      try {
        const enriched = await enrichProductWithAI(product, apiKey, rules, (p) => setPhase(p));
        acc[idx] = { ...product, enriched, _ok: true, _err: undefined };
      } catch (e) {
        acc[idx] = { ...product, enriched: null, _ok: false, _err: e.message };
      }
      setResults([...acc]);
    }
    setRunning(false);
    setCurrent(-1);
    return acc;
  };

  const run = async () => {
    setStarted(true);
    // Initialize result slots
    const init = products.map(p => ({ ...p, _ok: false, _err: undefined, _pending: true }));
    setResults(init);
    const batch = products.map((p, i) => ({ product: p, idx: i }));
    const final = await runBatch(batch, init);
    setTimeout(() => onDone(final), 600);
  };

  const retryFailed = async () => {
    const batch = results
      .map((r, i) => ({ product: products[i], idx: i, ok: r._ok }))
      .filter(x => !x.ok);
    const final = await runBatch(batch, results);
    if (final.every(r => r._ok || r._pending === false)) {
      setTimeout(() => onDone(final), 600);
    }
  };

  const pct = products.length
    ? Math.round((results.filter(r => !r._pending).length / products.length) * 100)
    : 0;
  const done = started && !running && results.length === products.length && results.every(r => !r._pending);
  const failedCount = results.filter(r => !r._pending && !r._ok).length;
  const successCount = results.filter(r => r._ok).length;

  return (
    <div className="max-w-md mx-auto text-center">
      <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 ${done && !failedCount ? "bg-green-100" : done && failedCount ? "bg-amber-100" : "bg-indigo-100"}`}>
        {done && !failedCount
          ? <CheckCircle size={32} className="text-green-500" />
          : done && failedCount
            ? <AlertCircle size={32} className="text-amber-500" />
            : <Zap size={32} className="text-indigo-600" />}
      </div>
      <h2 className="text-xl font-bold text-gray-900 mb-1">
        {!started
          ? "Enriquecimento com IA"
          : running
            ? "Processando produtos..."
            : done && !failedCount
              ? "Enriquecimento concluído!"
              : done
                ? `${failedCount} produto(s) com erro`
                : "Processando..."}
      </h2>
      <p className="text-gray-500 text-sm mb-6">
        {!started ? `A IA vai gerar título, descrição, atributos e tags para ${products.length} produto(s).` : ""}
      </p>

      {!started && (
        <>
          {(rules?.titleTemplate || (rules?.descriptionStyles || []).length > 0 || rules?.additionalInstructions) && (
            <div className="mb-4 p-4 bg-indigo-50 border border-indigo-100 rounded-2xl text-left text-sm space-y-1.5">
              <p className="font-semibold text-indigo-700 text-xs mb-2">📋 Regras configuradas</p>
              {rules.aiModel && rules.aiModel !== "gpt-4o" && (
                <p className="text-xs text-indigo-600">🤖 Modelo: <span className="font-medium">{rules.aiModel}</span></p>
              )}
              {rules.titleTemplate && (
                <p className="text-xs text-indigo-600">🏷️ Padrão: <span className="font-mono font-medium">{rules.titleTemplate}</span></p>
              )}
              {(rules.descriptionStyles || []).length > 0 && (
                <p className="text-xs text-indigo-600">✍️ Estilos: <span className="font-medium">{rules.descriptionStyles.join(", ")}</span></p>
              )}
            </div>
          )}
          {!apiKey && (
            <div className="mb-4 p-3 bg-amber-50 border border-amber-200 rounded-xl text-amber-700 text-sm flex items-center gap-2">
              <AlertCircle size={15} /> Configure a chave da OpenAI nas configurações antes de continuar.
            </div>
          )}
          <div className="flex gap-3 justify-center">
            {onBack && (
              <button onClick={onBack}
                className="px-5 py-3 border border-gray-300 rounded-2xl text-sm font-medium hover:bg-gray-50 flex items-center gap-2 transition-colors">
                <ChevronLeft size={16} /> Voltar
              </button>
            )}
            <button onClick={run} disabled={!apiKey}
              className="px-8 py-3 bg-indigo-600 text-white rounded-2xl font-semibold hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed shadow-md shadow-indigo-200 flex items-center gap-2">
              <Zap size={16} /> Iniciar Enriquecimento
            </button>
          </div>
        </>
      )}

      {started && (
        <div className="text-left">
          {/* Progress bar */}
          <div className="flex justify-between text-sm text-gray-500 mb-2">
            <span>{successCount} ok · {failedCount} erro · {results.filter(r => r._pending).length} pendente</span>
            <span className="font-semibold text-indigo-600">{pct}%</span>
          </div>
          <div className="w-full bg-gray-100 rounded-full h-3 mb-5 overflow-hidden">
            <div className="bg-gradient-to-r from-indigo-500 to-purple-500 h-3 rounded-full transition-all duration-500" style={{ width: `${pct}%` }} />
          </div>

          {/* Currently processing */}
          {running && current >= 0 && current < products.length && (
            <div className="mb-4 text-center">
              <p className="text-sm text-gray-600 flex items-center justify-center gap-2">
                <Loader size={14} className="animate-spin text-indigo-500" />
                <span className="font-medium truncate max-w-xs">{products[current]?.produto_fornecedor}</span>
              </p>
              {phase && (
                <p className="text-xs text-indigo-500 font-medium mt-1 flex items-center justify-center gap-1">
                  {phase === "Pesquisando na web..." ? "🔍" : "✨"} {phase}
                </p>
              )}
            </div>
          )}

          {/* Results list */}
          <div className="space-y-1.5 max-h-60 overflow-y-auto pr-1">
            {results.map((r, i) => (
              <div key={i}>
                <div
                  className={`flex items-center gap-2 px-3 py-2 rounded-xl text-sm cursor-default
                    ${r._pending ? "bg-gray-50 text-gray-400" : r._ok ? "bg-green-50 text-green-700" : "bg-red-50 text-red-700"}`}
                  onClick={() => !r._ok && r._err && setExpandedErr(expandedErr === i ? null : i)}
                >
                  {r._pending
                    ? <Loader size={14} className="shrink-0 opacity-40" />
                    : r._ok
                      ? <CheckCircle size={14} className="shrink-0" />
                      : <XCircle size={14} className="shrink-0 cursor-pointer" />}
                  <span className="flex-1 truncate text-xs">{r.produto_fornecedor}</span>
                  {!r._ok && !r._pending && r._err && (
                    <span className="text-xs opacity-60 shrink-0">{expandedErr === i ? "▲" : "▼"}</span>
                  )}
                </div>
                {/* Full error message, expandable */}
                {expandedErr === i && r._err && (
                  <div className="mt-0.5 mx-1 px-3 py-2 bg-red-50 border border-red-200 rounded-xl text-xs text-red-700 break-all">
                    {r._err}
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Actions when done */}
          {done && failedCount > 0 && (
            <div className="mt-4 flex gap-2 justify-center">
              <button onClick={retryFailed}
                className="px-5 py-2 bg-amber-500 text-white rounded-xl text-sm font-semibold hover:bg-amber-600 flex items-center gap-1.5 shadow-sm">
                <RefreshCw size={14} /> Tentar novamente ({failedCount} falha{failedCount > 1 ? "s" : ""})
              </button>
              {successCount > 0 && (
                <button onClick={() => onDone(results)}
                  className="px-5 py-2 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 flex items-center gap-1.5 shadow-sm">
                  Continuar com {successCount} produto{successCount > 1 ? "s" : ""} <ChevronRight size={14} />
                </button>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// REVIEW STEP
// ─────────────────────────────────────────────
function ReviewStep({ products, apiKey, tinyToken, corsProxy, onDone, onBack }) {
  const [items, setItems] = useState(() =>
    products.map(p => ({ ...p, _approved: false, _imgPrompt: "", _generatedImage: null, _imgUrl: p.link_imagens_drive || "", _marcaId: null, _marcaSearch: p.marca || "", _fornecedorId: null, _fornecedorSearch: p.fornecedor || "" }))
  );
  const [idx, setIdx] = useState(0);
  const [genLoading, setGenLoading] = useState(false);
  const [genError, setGenError] = useState("");
  const [activeTab, setActiveTab] = useState("content");
  const [brandList, setBrandList] = React.useState([]);
  const [brandsLoaded, setBrandsLoaded] = React.useState(false);
  const [fornecList, setFornecList] = React.useState([]);
  const [fornecLoading, setFornecLoading] = React.useState(false);
  const fornecTimerRef = React.useRef(null);
  const [availableTags, setAvailableTags] = useState([]);
  const [tagsLoading, setTagsLoading] = useState(false);
  const [selectedTagNames, setSelectedTagNames] = useState([]); const [tagInput, setTagInput] = useState('');
  React.useEffect(() => {
    if (!tinyToken) return;
    setTagsLoading(true);
    fetchTinyTagsXHR(tinyToken, corsProxy || '').then(tags => {
      setAvailableTags(tags);
      setTagsLoading(false);
    });
  }, [tinyToken]);
React.useEffect(() => {
    if (!tinyToken) { setBrandsLoaded(true); return; }
    // XHR bypasses the fetch interceptor that would corrupt GET /marcas
    var proxy = (corsProxy || 'https://corsproxy.io/?') + 'url=' + encodeURIComponent('https://api.tiny.com.br/public-api/v3/marcas?limit=100');  // v25
    var xhr = new XMLHttpRequest();
    xhr.open('GET', proxy);
    xhr.setRequestHeader('Authorization', 'Bearer ' + tinyToken);
    xhr.onload = function() {
      try {
        var d = JSON.parse(xhr.responseText);
        var list = d.itens || d.data || [];
        setBrandList(list);
        setItems(function(prev) {
          return prev.map(function(item) {
            if (item._marcaId) return item;
            var search = (item._marcaSearch || item.marca || '').toLowerCase().trim();
            var match = list.find(function(b) { return (b.descricao||b.nome||'').toLowerCase().trim() === search; });  // v24-hf5
            return Object.assign({}, item, { _marcaId: match ? match.id : null });
          });
        });
      } catch(e) {}
      setBrandsLoaded(true);
    };
    xhr.onerror = function() { setBrandsLoaded(true); };
    xhr.send();
  }, [tinyToken, corsProxy]);

  // Auto-match fornecedor da planilha contra Tiny /contatos
  React.useEffect(() => {
    if (!tinyToken || !brandsLoaded) return;
    var uniqueNames = [];
    items.forEach(function(it) {
      var nm = (it._fornecedorSearch || '').trim();
      if (nm && !it._fornecedorId && uniqueNames.indexOf(nm) === -1) uniqueNames.push(nm);
    });
    if (uniqueNames.length === 0) return;
    var delay = 0;
    uniqueNames.forEach(function(nome) {
      setTimeout(function() {
        var proxy = (corsProxy || 'https://corsproxy.io/?') + 'url=' + encodeURIComponent('https://api.tiny.com.br/public-api/v3/contatos?nome=' + encodeURIComponent(nome) + '&limit=10');
        var xhr = new XMLHttpRequest();
        xhr.open('GET', proxy);
        xhr.setRequestHeader('Authorization', 'Bearer ' + tinyToken);
        xhr.onload = function() {
          try {
            var d = JSON.parse(xhr.responseText);
            var list = (d.itens || d.data || []).map(function(fc) { return { id: fc.id, nome: fc.nome || fc.fantasia || fc.razaoSocial || '' }; });
            var match = list.find(function(f) { return f.nome.toLowerCase().trim() === nome.toLowerCase().trim(); });
            if (!match && list.length === 1) match = list[0];
            if (match) {
              setItems(function(prev) {
                return prev.map(function(it) {
                  if ((it._fornecedorSearch || '').trim().toLowerCase() === nome.toLowerCase().trim() && !it._fornecedorId) {
                    return Object.assign({}, it, { _fornecedorId: match.id, _fornecedorSearch: match.nome });
                  }
                  return it;
                });
              });
            }
          } catch(e) {}
        };
        xhr.send();
      }, delay);
      delay += 600;
    });
  }, [brandsLoaded, tinyToken, corsProxy]);

  const searchFornec = React.useCallback((term) => {
    if (!tinyToken || !term) return;
    setFornecLoading(true);
    setFornecList([]);
    var proxy2 = (corsProxy || 'https://corsproxy.io/?') + 'url=' + encodeURIComponent('https://api.tiny.com.br/public-api/v3/contatos?nome=' + encodeURIComponent(term) + '&limit=20');
    var xhr2 = new XMLHttpRequest();
    xhr2.open('GET', proxy2);
    xhr2.setRequestHeader('Authorization', 'Bearer ' + tinyToken);
    xhr2.onload = function() {
      setFornecLoading(false);
      try {

              <span className="text-gray-800 break-all">{value || "—"}</span>
            </div>
          ))}
        </div>
      )}

      {/* Navigation + Approve */}
      <div className="flex items-center justify-between mt-6 gap-3">
        <button onClick={() => setIdx(Math.max(0, idx - 1))} disabled={idx === 0}
          className="px-4 py-2.5 border border-gray-300 rounded-xl text-sm font-medium hover:bg-gray-50 disabled:opacity-30 flex items-center gap-1">
          <ChevronLeft size={16} /> Anterior
        </button>

        <button onClick={handleApprove}
          className={`flex-1 py-2.5 rounded-xl text-sm font-semibold flex items-center justify-center gap-1.5 transition-all ${
            cur._approved ? "bg-green-100 text-green-700 border border-green-300 hover:bg-green-200" : "bg-indigo-600 text-white hover:bg-indigo-700 shadow-md shadow-indigo-200"
          }`}>
          <CheckCircle size={15} />
          {cur._approved ? "Aprovado ✓" : "Aprovar produto"}
        </button>

        <button onClick={() => setIdx(Math.min(items.length - 1, idx + 1))} disabled={idx === items.length - 1}
          className="px-4 py-2.5 border border-gray-300 rounded-xl text-sm font-medium hover:bg-gray-50 disabled:opacity-30 flex items-center gap-1">
          Próximo <ChevronRight size={16} />
        </button>
      </div>
    </div>
  );
}

function SyncStep({ products, tinyToken, corsProxy, onRestart, selectedTagNames = [], availableTags = [] }) {

  const [stopFlag, setStopFlag]         = useState({ stop: false });

          (k.tipo_de_produto || "S").toUpperCase() === "K" && k._codigoPai === pSku

        acc.push({ ...main, _syncOk: true });
        if (_tr && _tr.id && children && children.length && selectedTagNames && selectedTagNames.length) {
          const _cbt = selectedTagNames.filter(function(n){return n&&n.trim();})
            .map(function(n){var _nm=n.trim();var _at=(availableTags||[]).find(function(t){return t.nome&&t.nome.toLowerCase()===_nm.toLowerCase();});return _at?{idTag:_at.id}:null;}).filter(Boolean);
          if (_cbt.length) {
            let _varList = (_tr.variacoes||[]).filter(function(_v){return _v&&_v.id;});
            if (!_varList.length) {
              try {
                const _gpUrl='https://api.tiny.com.br/public-api/v3/produtos/'+_tr.id;
                const _gpFinal=(corsProxy||'')?corsProxy+encodeURIComponent(_gpUrl):_gpUrl;
                const _gpRes=await fetch(_gpFinal,{headers:{'Authorization':'Bearer '+tinyToken,'Accept':'application/json'}});
                if (_gpRes.ok) { const _gpData=await _gpRes.json(); _varList=(_gpData.variacoes||[]).filter(function(_v){return _v&&_v.id;}); }
              } catch(_gpErr){}
            }
            for (const _v of _varList) {
              const _cbtu='https://api.tiny.com.br/public-api/v3/produtos/'+_v.id+'/tags';
              const _cbturl=(corsProxy||'')?corsProxy+encodeURIComponent(_cbtu):_cbtu;
              await new Promise(function(_res3){
                var _xhr3=new XMLHttpRequest();
                _xhr3.open('POST',_cbturl,true);
                _xhr3.setRequestHeader('Authorization','Bearer '+tinyToken);
                _xhr3.setRequestHeader('Content-Type','application/json');
                _xhr3.setRequestHeader('Accept','application/json');
                _xhr3.onload=function(){_res3(_xhr3.status);};
                _xhr3.onerror=function(){_res3(0);};
                _xhr3.send(JSON.stringify(_cbt));
              });

        }
        // Peso bruto/líquido nas variações: GET pai para IDs atuais das variações, depois PUT em cada filho
if(_tr&&_tr.id&&children&&children.length){
  const _skuPesoMap={};
  for(let _ci=0;_ci<children.length;_ci++){
    const _ch=children[_ci];
    if(!_ch) continue;

          if(!(_vPeso>0)) continue;
          const _putXhr=new XMLHttpRequest();
          _putXhr.open('PUT','https://corsproxy.io/?url='+encodeURIComponent('https://api.tiny.com.br/public-api/v3/produtos/'+_tr.id+'/variacoes/'+_vari.id));
          _putXhr.setRequestHeader('Authorization','Bearer '+tinyToken);
          _putXhr.setRequestHeader('Content-Type','application/json');

}
        for (const k of children) {

      setSyncResults([...acc]);
      if (i < tasks.length - 1) await new Promise(r => setTimeout(r, 260));

    setSyncDone(true);
  };

  const handleSyncAll  = () => runSync(resolved);
  const handleRetryFail = () => {
    const failed = syncResults.filter(r => !r._syncOk);
    setSyncResults(syncResults.filter(r => r._syncOk));
    runSync(failed);
  };
  const handleStop = () => { stopFlag.stop = true; };

  const handleExportCSV = () => {
    const csv = buildTinyCSV(resolved);
    const date = new Date().toISOString().slice(0, 10);
    downloadCSV(csv, `tiny-produtos-${date}.csv`);

  const ok   = syncResults.filter(r => r._syncOk).length;
  const fail = syncResults.filter(r => !r._syncOk).length;
  const hasCors = syncResults.some(r => !r._syncOk && r._syncErr && r._syncErr.toLowerCase().includes("cors"));
  const pct = resolved.length > 0 ? Math.round((syncResults.length / resolved.length) * 100) : 0;

  return (
    <div className="max-w-lg mx-auto">
      {/* Header */}
      <div className="text-center mb-6">

          {syncDone && fail === 0

        <div className="p-3 bg-orange-50 border border-orange-200 rounded-xl text-orange-800 text-xs mb-4 space-y-1">
          <div className="flex items-center gap-2 font-semibold"><AlertCircle size={13} /> CORS bloqueado pelo Tiny</div>

        </div>
      )}

      {/* PRIMARY: API Sync */}

        {/* Progress bar */}
        {(syncing || (syncResults.length > 0 && !syncDone)) && (
          <div className="space-y-1">

              <div className="h-2 bg-indigo-500 rounded-full transition-all duration-300" style={{ width: `${pct}%` }} />

              <Send size={15} /> Enviar {resolved.length} produto{resolved.length !== 1 ? "s" : ""}
            </button>
          )}
          {syncing && (
            <button onClick={handleStop}
              className="flex-1 py-3 bg-red-50 border border-red-300 text-red-700 rounded-xl text-sm font-semibold hover:bg-red-100 flex items-center justify-center gap-2 transition-colors">
              <XCircle size={15} /> Parar envio
            </button>
          )}
          {syncDone && fail > 0 && !syncing && (
            <button onClick={handleRetryFail}
              className="flex-1 py-2.5 bg-amber-50 border border-amber-300 text-amber-800 rounded-xl text-sm font-semibold hover:bg-amber-100 flex items-center justify-center gap-2 transition-colors">
              <Loader size={14} /> Reenviar {fail} com erro
            </button>
          )}
          {syncDone && !syncing && (
            <button onClick={handleSyncAll} disabled={!tinyToken}
              className="flex-1 py-2.5 border border-gray-300 text-gray-700 rounded-xl text-sm font-medium hover:bg-gray-50 disabled:opacity-40 flex items-center justify-center gap-2 transition-colors">
              <Send size={14} /> Reenviar tudo
            </button>
          )}
        </div>

        {/* Summary grid */}
        {syncDone && (
          <div className="grid grid-cols-2 gap-2">
            <div className="p-3 bg-green-50 rounded-xl text-center border border-green-100">

              <div className="text-xs text-green-700 font-medium mt-0.5">Cadastrados</div>
            </div>
            <div className={`p-3 rounded-xl text-center border ${fail > 0 ? "bg-red-50 border-red-100" : "bg-gray-50 border-gray-100"}`}>
              <div className={`text-2xl font-bold ${fail > 0 ? "text-red-600" : "text-gray-400"}`}>{fail}</div>
              <div className={`text-xs font-medium mt-0.5 ${fail > 0 ? "text-red-700" : "text-gray-400"}`}>Com erro</div>
            </div>
          </div>
        )}

        {/* Per-product results */}
        {syncResults.length > 0 && (
          <div className="space-y-1 max-h-52 overflow-y-auto pr-1">
            {syncResults.map((r, i) => (
              <div key={i} className={`rounded-lg text-xs ${r._syncOk ? "bg-green-50 text-green-700" : "bg-red-50 text-red-700"}`}>
                <button className="w-full flex items-center gap-2 px-3 py-1.5 text-left"
                  onClick={() => !r._syncOk && setExpandedErr(prev => ({ ...prev, [i]: !prev[i] }))}>
                  {r._syncOk ? <CheckCircle size={12} className="shrink-0" /> : <XCircle size={12} className="shrink-0" />}
                  <span className="flex-1 truncate font-medium">{r.enriched?.titulo_otimizado || r.produto_fornecedor}</span>
                  {!r._syncOk && <span className="opacity-60 text-[10px] shrink-0">{expandedErr[i] ? "▲" : "▼"}</span>}
                </button>
                {!r._syncOk && expandedErr[i] && (
                  <div className="px-3 pb-2 text-[11px] opacity-80 break-words">{r._syncErr}</div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* BACKUP: CSV Export */}
      <details className="mb-5">
        <summary className="cursor-pointer text-xs text-gray-500 hover:text-gray-700 flex items-center gap-1.5 mb-2 select-none">
          <FileText size={12} /> Prefere importar por planilha? <span className="underline">Exportar CSV</span>
        </summary>
        <div className="p-4 bg-white border border-gray-200 rounded-2xl space-y-2">
          <p className="text-xs text-gray-500">Gera planilha no formato padrão Tiny ERP para importação manual em <strong>Produtos → Importar Planilha</strong>.</p>
          {exported && (
            <div className="p-2.5 bg-green-50 border border-green-200 rounded-xl text-green-700 text-xs flex items-center gap-2">
              <CheckCircle size={12} /> CSV baixado!
            </div>
          )}
          <button onClick={handleExportCSV}
            className="w-full py-2.5 border border-gray-300 text-gray-700 rounded-xl text-sm font-medium hover:bg-gray-50 flex items-center justify-center gap-2 transition-colors">
            <FileText size={14} /> {exported ? "Exportar novamente" : `Baixar CSV (${products.length} produto${products.length !== 1 ? "s" : ""})`}
          </button>
        </div>
      </details>

      <button onClick={onRestart}
        className="w-full py-3 border border-gray-300 rounded-2xl text-sm font-medium hover:bg-gray-50 flex items-center justify-center gap-2">
        <Home size={15} /> Novo cadastro
      </button>
    </div>
  );
}

// ─────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────
function App() {
  const [step, setStep] = useState("upload");
  const [apiKeys, setApiKeys] = useState(() => {
    try {
      const s = localStorage.getItem('mpads_keys');
      const base = { openai: "", tiny: "", corsProxy: "", tinyClientId: "", tinyClientSecret: "", tinyRefresh: "", tinyExpiry: 0 };
      if (!s) return base;
      const k = JSON.parse(s);
      // Migrate old corsProxy format: "https://corsproxy.io/?https://api.openai.com" → "https://corsproxy.io/?"
      if (k.corsProxy && /\?https?:\/\//.test(k.corsProxy)) {
        k.corsProxy = k.corsProxy.replace(/\?.*$/, '?');
      }
      return { ...base, ...k };
    }
    catch { return { openai: "", tiny: "", corsProxy: "", tinyClientId: "", tinyClientSecret: "", tinyRefresh: "", tinyExpiry: 0 }; }
  });
  const [enrichmentRules, setEnrichmentRules] = useState(() => {
    const def = { aiModel: "gpt-4o", titleTemplate: "", descriptionStyles: [], additionalInstructions: "", activeMarketplaces: MARKETPLACES.map(m => m.id) };
    try { const s = localStorage.getItem('mpads_rules'); return s ? { ...def, ...JSON.parse(s) } : def; } catch { return def; }
  });
  const [showSettings, setShowSettings] = useState(() => {
    try { const s = localStorage.getItem('mpads_keys'); if (!s) return true; const k = JSON.parse(s); return !k.openai; } catch { return true; }
  });
  const [raw, setRaw] = useState([]);
  const [columnMap, setColumnMap] = useState({});
  const [valid, setValid] = useState([]);
  const [enriched, setEnriched] = useState([]);
  const [approved, setApproved] = useState([]);
  const [selectedTagNames, setSelectedTagNames] = useState([]); const [availableTags, setAvailableTags] = useState([]);

  const restart = () => { setStep("upload"); setRaw([]); setColumnMap({}); setValid([]); setEnriched([]); setApproved([]); };

  // Handle OAuth2 callback (page loaded with ?code=...)
  React.useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (!code) return;
    window.history.replaceState({}, '', window.location.href.split('?')[0]);
    const clientId = sessionStorage.getItem('oauth_client_id');
    if (!clientId) return;
    let keys = {};
    try { keys = JSON.parse(localStorage.getItem('mpads_keys') || '{}'); } catch {}
    const clientSecret = keys.tinyClientSecret || '';
    const corsProxy = keys.corsProxy || '';
    exchangeTinyCode(code, clientId, clientSecret, corsProxy)
      .then(data => {
        const expiry = Date.now() + ((data.expires_in || 14400) - 60) * 1000;
        const newKeys = { ...keys, tiny: data.access_token, tinyRefresh: data.refresh_token || '', tinyExpiry: expiry, tinyClientId: clientId };
        try { localStorage.setItem('mpads_keys', JSON.stringify(newKeys)); } catch {}
        setApiKeys(newKeys);
        sessionStorage.removeItem('pkce_verifier');
        sessionStorage.removeItem('oauth_client_id');
        setShowSettings(false);
      })
      .catch(err => alert('❌ Erro na autenticação Tiny: ' + err.message));
  }, []);

  const keysConfigured = apiKeys.openai && apiKeys.tiny;
  const rulesConfigured = enrichmentRules.titleTemplate || enrichmentRules.descriptionStyles.length > 0;

  return (
    <div className="min-h-screen bg-slate-50">
      {/* Header */}
      <header className="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center shadow-sm">
              <Package size={18} className="text-white" />
            </div>
            <div>
              <h1 className="font-bold text-gray-900 text-sm leading-none">Machine PADS</h1>
              <p className="text-xs text-gray-400 leading-none mt-0.5">Cadastro Massivo</p>
            </div>
          </div>
          <button onClick={() => setShowSettings(true)}
            className="flex items-center gap-2 px-3 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-xl transition-colors">
            <Settings size={16} />
            <span className="hidden sm:inline font-medium">Configurações</span>
            {keysConfigured
              ? <span className="w-2 h-2 bg-green-500 rounded-full" title="Configurações salvas" />
              : <span className="w-2 h-2 bg-amber-500 rounded-full animate-pulse" title="Configure as chaves de API" />
            }
          </button>
        </div>
      </header>

      {/* Main */}
      <main className="max-w-4xl mx-auto px-4 sm:px-6 py-8">
        <StepBar current={step} onNavigate={s => setStep(s)} />

        {step === "upload" && (
          <UploadStep onUpload={(rows, cm) => { setRaw(rows); setColumnMap(cm || {}); setStep("validation"); }} />
        )}
        {step === "validation" && (
          <ValidationStep raw={raw} columnMap={columnMap} onProceed={v => { setValid(v); setStep("enrichment"); }} onBack={() => setStep("upload")} />
        )}
        {step === "enrichment" && (
          <EnrichmentStep products={valid} apiKey={apiKeys.openai} rules={{...enrichmentRules, corsProxy: apiKeys.corsProxy}} onDone={e => { setEnriched(resolveParentChild(e)); setStep("review"); }} onBack={() => setStep("validation")} />
        )}
        {step === "review" && (
          <ReviewStep products={enriched} apiKey={apiKeys.openai} tinyToken={apiKeys.tiny} corsProxy={apiKeys.corsProxy} onDone={(a,t,tags) => { setApproved(a); setSelectedTagNames(t||[]); setAvailableTags(tags||[]); setStep("sync"); }} onBack={() => setStep("enrichment")} />
        )}
        {step === "sync" && (
          <SyncStep products={approved} tinyToken={apiKeys.tiny} corsProxy={apiKeys.corsProxy} onRestart={restart} selectedTagNames={selectedTagNames} availableTags={availableTags} />
        )}
      </main>

      {showSettings && (
        <SettingsModal
          keys={apiKeys} setKeys={setApiKeys}
          rules={enrichmentRules} setRules={setEnrichmentRules}
          onClose={() => setShowSettings(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
