function resolveColumnName(raw) {
  // 1. Normalize the key
  const nk = String(raw)
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_|_$/g, "");
  // 2. Direct match
  if (COLUMN_ALIASES[nk]) return COLUMN_ALIASES[nk];
  // 3. Prefix match (e.g. "ncm_classificacao_fiscal" starts with "ncm")
  for (const [alias, canonical] of Object.entries(COLUMN_ALIASES)) {
    if (nk.startsWith(alias + "_") || nk === alias) return canonical;
  }
  return nk;
}

function normalizeKey(key) {

    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_|_$/g, "");
}

// Cleans values that Excel stores as floats (e.g. EAN: 7893946001234.0 \u2192 "7893946001234")
function cleanNumericString(val) {
  if (val === null || val === undefined || val === "") return "";
  const s = String(val).trim();
  if (/^\d+\.0+$/.test(s)) return String(Math.round(parseFloat(s)));
  return s;
}

}

function mapGarantia(val) {
  if (!val) return "";
  const num = String(val).replace(/\D/g, "");
  return num ? `${num} meses` : String(val);
}

// After all products are enriched, resolve V\u2192K parent/child relationships
function resolveParentChild(products) {
  const vProds = products.filter(p => (p.tipo_de_produto || "S").toUpperCase() === "V");

  // Step 1: set _codigoPai on each K product
  let resolved = products.map(p => {
    if ((p.tipo_de_produto || "S").toUpperCase() !== "K") return p;
    const kSku = (p.enriched?.sku_interno || "").toUpperCase();
    const kName = (p.produto_fornecedor || "").toLowerCase()
      .replace(/\s*[-\u2013]\s*(110v|220v|127v|220|110|127|bivolt)\s*$/i, "").trim();

    let parent = null;
    // Match by SKU prefix
    for (const v of vProds) {
      const vSku = (v.enriched?.sku_interno || "").toUpperCase();
      if (vSku && kSku.startsWith(vSku + "-")) { parent = v; break; }
    }
    // Fallback: match by product name similarity
    if (!parent) {
      for (const v of vProds) {
        const vName = (v.produto_fornecedor || "").toLowerCase()
          .replace(/\s*[-\u2013]\s*(110v|220v|127v|220|110|127|bivolt)\s*$/i, "").trim();
        if (vName.length > 5 && kName.includes(vName.substring(0, Math.min(vName.length, 25)))) {
          parent = v; break;
        }
      }
    }
    return { ...p, _codigoPai: parent?.enriched?.sku_interno || "" };
  });

  // Step 2: update V products' variacoes based on their K children
  resolved = resolved.map(p => {
    if ((p.tipo_de_produto || "S").toUpperCase() !== "V") return p;
    const vSku = p.enriched?.sku_interno || "";
    const children = resolved.filter(c => c._codigoPai === vSku);
    if (!children.length) return p;
    const varMap = {};
    children.forEach(c => {
      (c.enriched?.variacoes || "").split(";").forEach(part => {
        const [name, val] = part.split(":").map(s => s.trim());
        if (name && val) {
          if (!varMap[name]) varMap[name] = [];
          if (!varMap[name].includes(val)) varMap[name].push(val);
        }
      });
    });
    const variacoes = Object.entries(varMap).map(([n, vs]) => `${n}: ${vs.join(",")}`).join(";");
    return { ...p, enriched: { ...p.enriched, variacoes } };
  });

  return resolved;
}

function buildTinyCSV(products) {
  const escape = (val) => {
    const s = String(val ?? "");
    return (s.includes(",") || s.includes("\n") || s.includes('"'))
      ? `"${s.replace(/"/g, '""')}"`
      : s;
  };
  const rows = [TINY_HEADERS, ...products.map(buildTinyRow)];
  return rows.map(r => r.map(escape).join(",")).join("\n");
}

function downloadCSV(content, filename) {
  const bom = "\uFEFF"; // UTF-8 BOM for Excel compatibility
  const blob = new Blob([bom + content], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function parseNumber(val) {
  if (val === null || val === undefined || val === "") return null;
  let s = String(val).trim();
  if (!s) return null;
  // Strip currency symbols, spaces and Excel error strings (#VALUE!, etc.)
  if (s.startsWith("#")) return null;
  s = s.replace(/[R$\s]/g, "");
  if (!s) return null;
  // Brazilian format "1.234,56" \u2192 has both period (thousands) and comma (decimal)
  if (s.includes(",") && s.includes(".")) {
    s = s.replace(/\./g, "").replace(",", ".");        // "1.234,56" \u2192 "1234.56"
  } else if (s.includes(",") && !s.includes(".")) {
    s = s.replace(",", ".");                            // "1234,56"  \u2192 "1234.56"
  }
  // Remove any remaining non-numeric characters except period and minus
  s = s.replace(/[^0-9.\-]/g, "");
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function isValidEAN(val) {
  const s = String(val).replace(/\D/g, "");
  return s.length === 8 || s.length === 13;
}

function isValidNCM(val) {
  const s = String(val).replace(/\D/g, "");
  return s.length === 8;
}

function isValidPrice(val) {
  return parseNumber(val) !== null;
}

function validateProduct(p) {
  const errors = [];
  const tipo = (p.tipo_de_produto || "S").toUpperCase();
  const isV = tipo === "V";

  for (const f of REQUIRED_FIELDS) {
    // EAN \u00E9 opcional para produtos do tipo V (produto pai com varia\u00E7\u00F5es)
    if (f === "ean" && isV) continue;
    if (!p[f] && p[f] !== 0) errors.push({ field: f, msg: `${FIELD_LABELS[f]} \u00E9 obrigat\u00F3rio` });
  }
  if (p.ean && !isValidEAN(p.ean)) errors.push({ field: "ean", msg: `EAN deve ter 8 ou 13 d\u00EDgitos num\u00E9ricos (recebido: "${p.ean}")` });
  if (p.ncm && !isValidNCM(p.ncm)) errors.push({ field: "ncm", msg: `NCM deve ter 8 d\u00EDgitos num\u00E9ricos (recebido: "${p.ncm}")` });
  if (p.preco_venda && !isValidPrice(p.preco_venda)) errors.push({ field: "preco_venda", msg: `Pre\u00E7o deve ser um n\u00FAmero v\u00E1lido (recebido: "${p.preco_venda}")` });
  return errors;
}

  onPhase?.("Pesquisando na web...");

    const err = await res2.json().catch(() => ({}));
    let msg = err?.error?.message || `OpenAI HTTP ${res2.status}`;
    if (res2.status === 429) msg = "\u26A0\uFE0F Quota/limite de uso atingido. Adicione cr\u00E9ditos em platform.openai.com/settings/billing";
    if (res2.status === 401) msg = "\uD83D\uDD11 Chave de API inv\u00E1lida. Verifique a chave nas Configura\u00E7\u00F5es.";
    if (res2.status === 403) msg = "\uD83D\uDEAB Acesso negado. Chave sem permiss\u00E3o para este modelo.";
    throw new Error(msg);
  }
  const data2 = await res2.json();

async function generateProductImage(productName, enrichedDesc, customPrompt, apiKey) {
  const fullPrompt = `Fotografia lifestyle profissional de alta qualidade, ilumina\u00E7\u00E3o cinematogr\u00E1fica natural, fundo desfocado bokeh. Produto: ${productName}. ${customPrompt}. Estilo: an\u00FAncio comercial premium para e-commerce brasileiro. Ultra realista, 4K.`;
  const res = await fetch("https://api.openai.com/v1/images/generations", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
    body: JSON.stringify({ model: "dall-e-3", prompt: fullPrompt, n: 1, size: "1024x1024", quality: "hd" }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `OpenAI Image ${res.status}`);
  }
  const data = await res.json();
  return data.data[0].url;
}

async function sendToTiny(product, token) {
  const body = {
    nome: product.enriched?.titulo_otimizado || product.produto_fornecedor,
    codigo: product.codigo_fornecedor || "",
    ean: String(product.ean || ""),
    preco: parseNumber(product.preco_venda) ?? 0,
    descricao: product.enriched?.descricao || "",
    unidade: product.unidade || "UN",
    ncm: String(product.ncm || "").replace(/\D/g, ""),
    origem: (product.origem || "").toLowerCase().includes("import") ? "I" : "N",
    peso_bruto: parseNumber(product.peso) ?? 0,
    largura: parseNumber(product.largura) ?? 0,
    altura: parseNumber(product.altura) ?? 0,
    comprimento: parseNumber(product.comprimento) ?? 0,
    marca: product.marca || "",
    garantia: product.garantia || "",
    palavras_chave: (product.enriched?.tags || []).join(", "),
    imagens: product.generatedImage ? [{ url: product.generatedImage }] : [],
  };
  const res = await fetch("https://api.tiny.com.br/public-api/v3/produtos", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.message || `Tiny API ${res.status}`);
  }
  return await res.json();
}

                        className={`flex items-center gap-2 p-2.5 rounded-xl border-2 text-left transition-all ${active ? "border-indigo-400 bg-indigo-50" : "border-gray-200 hover:border-gray-300"}`}>
                        <div className={`w-4 h-4 rounded flex items-center justify-center shrink-0 border-2 ${active ? "bg-indigo-600 border-indigo-600" : "border-gray-300"}`}>
                          {active && <CheckCircle size={10} className="text-white" />}
                        </div>
                        <span className="text-sm">{mp.icon}</span>
                        <div>
                          <div className="text-xs font-semibold text-gray-800">{mp.label}</div>
                          <div className="text-xs text-gray-400">{mp.limit} chars</div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Additional instructions */}
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Instru\u00E7\u00F5es adicionais</label>
                <textarea
                  value={localRules.additionalInstructions || ""}
                  onChange={e => setRule("additionalInstructions", e.target.value)}
                  rows={3}
                  placeholder='Ex: "Sempre mencione que o produto possui certifica\u00E7\u00E3o INMETRO. Evite superlativos como melhor e perfeito."'
                  className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"
                />
                <p className="text-xs text-gray-400 mt-1">Texto livre enviado diretamente para a IA em todos os produtos.</p>
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div className="p-5 border-t border-gray-100 flex gap-3 shrink-0">
          <button onClick={onClose} className="flex-1 py-2.5 border border-gray-300 rounded-xl text-sm font-medium hover:bg-gray-50">Cancelar</button>
          <button onClick={() => { setKeys(localKeys); setRules(localRules); onClose(); }}
            className="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700">
            Salvar configura\u00E7\u00F5es
          </button>
        </div>
      </div>
    </div>
  );
}

// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// CSV PARSER
// Custom RFC-4180 CSV parser that:
//   - Always uses comma as delimiter (no auto-detection)
//   - Handles quoted fields with embedded commas/newlines
//   - Preserves tabs inside field names (e.g. "Unidade\tPreco_venda")
//   - Returns plain objects (header row \u2192 keys, data rows \u2192 values)
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function parseCSVText(text) {
  // Remove UTF-8 BOM if present
  const s = text.replace(/^\uFEFF/, "");

  // Parse all records into arrays of strings
  const records = [];
  let i = 0;

  while (i < s.length) {
    const fields = [];
    // Read each field in the current row
    while (true) {
      let val = "";
      if (s[i] === '"') {
        // Quoted field
        i++; // skip opening quote
        while (i < s.length) {
          if (s[i] === '"' && s[i + 1] === '"') { val += '"'; i += 2; }
          else if (s[i] === '"') { i++; break; }  // closing quote
          else { val += s[i++]; }
        }
      } else {
        // Unquoted field: read until comma or end-of-record
        while (i < s.length && s[i] !== "," && s[i] !== "\r" && s[i] !== "\n") {
          val += s[i++];
        }
      }
      fields.push(val);
      if (i < s.length && s[i] === ",") { i++; continue; } // next field
      break; // end of record
    }
    // Skip \r\n or \n
    if (i < s.length && s[i] === "\r") i++;
    if (i < s.length && s[i] === "\n") i++;

    // Keep record if at least one field is non-empty
    if (fields.some(f => f.trim() !== "")) records.push(fields);
  }

  if (records.length < 2) return [];
  const headers = records[0];
  return records.slice(1).map(vals => {
    const obj = {};
    headers.forEach((h, j) => { obj[h] = vals[j] ?? ""; });
    return obj;
  });
}

// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// UPLOAD STEP
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function UploadStep({ onUpload }) {
  const [dragging, setDragging] = useState(false);
  const [error, setError] = useState("");
  const inputRef = useRef(null);

  const processFile = useCallback(async (file) => {
    setError("");
    const ext = file.name.split(".").pop().toLowerCase();
    if (!["xlsx", "xls", "csv"].includes(ext)) {
      setError("Formato n\u00E3o suportado. Use Excel (.xlsx, .xls) ou CSV."); return;
    }
    try {
      let rawRows;

      if (ext === "csv") {
        // \u2500\u2500 CSV: read as text (proper UTF-8 decode) then parse manually.
        // Avoids SheetJS binary\u2192string encoding issues that garble accented chars
        // (e.g. "Pre\u00E7o de Venda" decoded as Latin-1 \u2192 "Pre\u00C3\u00A7o de Venda").
        const text = await file.text();
        rawRows = parseCSVText(text);
      } else {
        // \u2500\u2500 XLSX / XLS: SheetJS binary read
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        rawRows = XLSX.utils.sheet_to_json(ws, { raw: false, defval: "" });
      }

      if (!rawRows.length) { setError("Arquivo sem dados reconhec\u00EDveis."); return; }

      // Build column map: original header \u2192 canonical name (for diagnostics)
      const columnMap = {};
      if (rawRows[0]) {
        Object.keys(rawRows[0]).forEach(k => { columnMap[k] = resolveColumnName(k); });
      }

      const normalized = rawRows.map(row => {
        const r = {};
        Object.entries(row).forEach(([k, v]) => {
          const canonical = resolveColumnName(k);
          let val = String(v ?? "").trim();
          if (canonical === "ean" || canonical === "ncm") val = cleanNumericString(val);
          // Don't overwrite an already-set non-empty value with an empty one.
          // Prevents a secondary column with the same canonical name from wiping a valid value.
          if (val !== "" || r[canonical] === undefined) {
            r[canonical] = val;
          }
        });
        return r;
      });
      // Filter out completely empty rows (trailing blank lines in CSV)
      const nonEmpty = normalized.filter(r => Object.values(r).some(v => String(v).trim() !== ""));
      onUpload(nonEmpty, columnMap);
    } catch (err) {
      setError("Erro ao ler o arquivo. Verifique se est\u00E1 no formato correto.");
    }
  }, [onUpload]);

  return (
    <div className="max-w-lg mx-auto">
      <div className="text-center mb-8">
        <div className="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <Package size={32} className="text-indigo-600" />
        </div>
        <h1 className="text-2xl font-bold text-gray-900">Cadastro Massivo de Produtos</h1>
        <p className="text-gray-500 mt-1.5 text-sm">Fa\u00E7a upload da planilha para iniciar o processo de enriquecimento</p>
      </div>
      <div
        onClick={() => inputRef.current?.click()}
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={e => { e.preventDefault(); setDragging(false); const f = e.dataTransfer.files[0]; if (f) processFile(f); }}
        className={`border-2 border-dashed rounded-2xl p-12 text-center cursor-pointer transition-all
          ${dragging ? "border-indigo-500 bg-indigo-50 scale-[1.01]" : "border-gray-300 hover:border-indigo-400 hover:bg-gray-50"}`}
      >
        <Upload size={36} className={`mx-auto mb-3 ${dragging ? "text-indigo-500" : "text-gray-400"}`} />
        <p className="font-semibold text-gray-700">Arraste o arquivo aqui ou clique para selecionar</p>
        <p className="text-sm text-gray-400 mt-1">Excel (.xlsx, .xls) ou CSV</p>
        <input ref={inputRef} type="file" className="hidden" accept=".xlsx,.xls,.csv" onChange={e => { if (e.target.files[0]) processFile(e.target.files[0]); }} />
      </div>
      {error && (
        <div className="mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm flex items-center gap-2">
          <XCircle size={16} className="shrink-0" /> {error}
        </div>
      )}
      <div className="mt-5 p-4 bg-gray-50 rounded-xl">
        <p className="text-xs font-semibold text-gray-600 mb-2">\uD83D\uDCCB Colunas esperadas na planilha</p>
        <p className="text-xs text-gray-400 leading-relaxed">EAN \u00B7 Produto_fornecedor \u00B7 Codigo_fornecedor \u00B7 Marca \u00B7 Fornecedor \u00B7 Origem \u00B7 NCM \u00B7 Classifica\u00E7\u00E3o_Fiscal \u00B7 Cubagem \u00B7 Peso \u00B7 Altura \u00B7 Largura \u00B7 Comprimento \u00B7 Link_imagens_drive \u00B7 Link_benchmark \u00B7 Categoria_sugerida \u00B7 Observacoes \u00B7 <strong>Status</strong> \u00B7 Unidade \u00B7 Preco_venda \u00B7 Garantia</p>
      </div>
    </div>
  );
}

// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// VALIDATION STEP
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function ValidationStep({ raw, columnMap, onProceed, onBack }) {
  const valid = [], blocked = [], ignored = [];
  for (const p of raw) {
    const status = (p.status || "").toLowerCase().trim();
    if (status !== "pronto") { ignored.push({ ...p, _reason: `Status: "${p.status || "(vazio)"}"` }); continue; }
    const errs = validateProduct(p);
    if (errs.length) blocked.push({ ...p, _errors: errs });
    else valid.push(p);
  }

  const [tab, setTab] = useState("valid");
  const [expanded, setExpanded] = useState(null);
  const [showColMap, setShowColMap] = useState(false);

  // Identify required fields that are completely absent from the column mapping
  const mappedCanonicals = new Set(Object.values(columnMap || {}));
  const missingRequired = REQUIRED_FIELDS.filter(f => !mappedCanonicals.has(f));

  const TABS = [
    { id: "valid", label: "V\u00E1lidos", count: valid.length, color: "green", Icon: CheckCircle },
    { id: "blocked", label: "Bloqueados", count: blocked.length, color: "red", Icon: XCircle },
    { id: "ignored", label: "Ignorados", count: ignored.length, color: "gray", Icon: AlertCircle },
  ];
  const activeList = tab === "valid" ? valid : tab === "blocked" ? blocked : ignored;

  return (
    <div>
      <div className="text-center mb-6">
        <h2 className="text-xl font-bold text-gray-900">Valida\u00E7\u00E3o dos Produtos</h2>
        <p className="text-gray-500 text-sm mt-1">{raw.length} linhas lidas da planilha</p>
      </div>

      {/* Column mapping diagnostics */}
      {Object.keys(columnMap || {}).length > 0 && (
        <div className="mb-4">
          {missingRequired.length > 0 && (
            <div className="p-3 mb-2 bg-red-50 border border-red-200 rounded-xl text-xs text-red-700 flex items-start gap-2">
              <AlertCircle size={13} className="shrink-0 mt-0.5" />
              <span>
                <strong>Colunas obrigat\u00F3rias n\u00E3o encontradas na planilha:</strong>{" "}
                {missingRequired.map(f => FIELD_LABELS[f] || f).join(", ")}.
                {" "}Verifique os nomes das colunas.
              </span>
            </div>
          )}
          <button onClick={() => setShowColMap(v => !v)}
            className="text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1 transition-colors">
            {showColMap ? "\u25B2" : "\u25BC"} Diagn\u00F3stico de colunas detectadas ({Object.keys(columnMap).length} colunas)
          </button>
          {showColMap && (
            <div className="mt-2 p-3 bg-gray-50 border border-gray-200 rounded-xl text-xs max-h-40 overflow-y-auto">
              <div className="grid grid-cols-1 gap-0.5">
                {Object.entries(columnMap).map(([orig, canon]) => {
                  const isRequired = REQUIRED_FIELDS.includes(canon);
                  return (
                    <div key={orig} className="flex gap-2 items-center">
                      <span className="text-gray-400 font-mono truncate max-w-[180px]" title={orig}>"{orig}"</span>
                      <span className="text-gray-400">\u2192</span>
                      <span className={`font-mono font-semibold ${isRequired ? "text-indigo-600" : "text-gray-500"}`}>{canon}</span>
                      {isRequired && <span className="text-indigo-400 text-[10px]">\u2713 obrigat\u00F3rio</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      <div className="grid grid-cols-3 gap-3 mb-5">
        {TABS.map(({ id, label, count, color, Icon }) => (
          <button key={id} onClick={() => { setTab(id); setExpanded(null); }}
            className={`p-4 rounded-2xl border-2 text-left transition-all
              ${tab === id
                ? color === "green" ? "border-green-500 bg-green-50"
                  : color === "red" ? "border-red-500 bg-red-50"
                  : "border-gray-400 bg-gray-50"
                : "border-gray-200 hover:border-gray-300 bg-white"}`}>
            <div className={`flex items-center gap-1.5 mb-1 text-xs font-semibold
              ${color === "green" ? "text-green-600" : color === "red" ? "text-red-600" : "text-gray-500"}`}>
              <Icon size={12} /> {label}
            </div>
            <div className={`text-3xl font-bold ${color === "green" ? "text-green-600" : color === "red" ? "text-red-600" : "text-gray-500"}`}>{count}</div>
          </button>
        ))}
      </div>

      <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden mb-5">
        <div className="overflow-x-auto max-h-60">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 sticky top-0 z-10">
              <tr>
                <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">EAN</th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Produto</th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Marca</th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">
                  {tab === "blocked" ? "Problemas" : tab === "ignored" ? "Motivo" : "Status"}
                </th>
              </tr>
            </thead>
            <tbody>
              {activeList.length === 0 ? (
                <tr><td colSpan={4} className="text-center py-10 text-gray-400 text-sm">Nenhum produto nessa categoria</td></tr>
              ) : activeList.flatMap((p, i) => {
                const rows = [
                  <tr key={`r${i}`}
                    className={`border-t border-gray-100 transition-colors ${tab === "blocked" ? "cursor-pointer hover:bg-red-50" : ""}`}
                    onClick={() => tab === "blocked" && setExpanded(expanded === i ? null : i)}>
                    <td className="px-4 py-3 font-mono text-xs text-gray-500">{p.ean || "\u2014"}</td>
                    <td className="px-4 py-3 font-medium text-gray-800 max-w-[200px] truncate">{p.produto_fornecedor || "\u2014"}</td>
                    <td className="px-4 py-3 text-gray-500 text-xs">{p.marca || "\u2014"}</td>
                    <td className="px-4 py-3">
                      {tab === "blocked" && (
                        <span className="inline-flex items-center gap-1 text-red-600 text-xs font-medium">
                          <XCircle size={12} /> {p._errors.length} erro(s) {expanded === i ? "\u25B2" : "\u25BC"}
                        </span>
                      )}
                      {tab === "ignored" && <span className="text-gray-400 text-xs">{p._reason}</span>}
                      {tab === "valid" && <span className="inline-flex items-center gap-1 text-green-600 text-xs"><CheckCircle size={12} /> Pronto</span>}
                    </td>
                  </tr>
                ];
                if (tab === "blocked" && expanded === i) {
                  rows.push(
                    <tr key={`d${i}`} className="bg-red-50 border-t border-red-100">
                      <td colSpan={4} className="px-6 py-4">
                        {/* Errors */}
                        <ul className="space-y-1 mb-3">
                          {p._errors.map((e, j) => (
                            <li key={j} className="text-xs text-red-700 flex items-start gap-1.5">
                              <AlertCircle size={11} className="shrink-0 mt-0.5" />
                              <span><span className="font-semibold">{FIELD_LABELS[e.field] || e.field}:</span> {e.msg}</span>
                            </li>
                          ))}
                        </ul>
                        {/* Debug: raw values received for all required fields */}
                        <div className="border-t border-red-200 pt-2">
                          <p className="text-xs font-semibold text-red-500 mb-1.5">\uD83D\uDD0D Valores lidos da planilha:</p>
                          <div className="grid grid-cols-2 gap-x-4 gap-y-0.5">
                            {REQUIRED_FIELDS.map(f => (
                              <div key={f} className="text-xs flex gap-1">
                                <span className="text-red-500 font-medium w-24 shrink-0">{FIELD_LABELS[f] || f}:</span>
                                <span className={`font-mono ${p[f] ? "text-gray-700" : "text-red-400 italic"}`}>
                                  {p[f] ? `"${p[f]}"` : "(vazio)"}
                                </span>
                              </div>
                            ))}
                          </div>
                        </div>
                      </td>
                    </tr>
                  );
                }
                return rows;
              })}
            </tbody>
          </table>
        </div>
      </div>

      {valid.length > 0 ? (
        <button onClick={() => onProceed(valid)}
          className="w-full py-3.5 bg-indigo-600 text-white rounded-2xl font-semibold hover:bg-indigo-700 flex items-center justify-center gap-2 transition-colors shadow-md shadow-indigo-200">
          Prosseguir com {valid.length} produto(s) v\u00E1lido(s) <ChevronRight size={18} />
        </button>
      ) : (
        <div className="text-center py-5 bg-gray-50 rounded-2xl text-gray-500 text-sm">
          Nenhum produto v\u00E1lido encontrado. Corrija os erros e fa\u00E7a upload novamente.
          <br />
          <button onClick={onBack} className="mt-3 px-4 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-100 inline-flex items-center gap-1">
            <Home size={14} /> Voltar ao upload
          </button>
        </div>
      )}
    </div>
  );
}

// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// ENRICHMENT STEP
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function EnrichmentStep({ products, apiKey, rules, onDone }) {
  const [results, setResults] = useState([]);
  const [current, setCurrent] = useState(-1);
  const [phase, setPhase] = useState("");
  const [started, setStarted] = useState(false);
  const [running, setRunning] = useState(false);
  const [expandedErr, setExpandedErr] = useState(null);

  // Run enrichment for a list of (product, index) pairs, merging into existing results
  const runBatch = async (batch, existingResults) => {
    setRunning(true);
    const acc = [...existingResults];
    for (const { product, idx } of batch) {
      setCurrent(idx);
      setPhase("");
      try {
        const enriched = await enrichProductWithAI(product, apiKey, rules, (p) => setPhase(p));
        acc[idx] = { ...product, enriched, _ok: true, _err: undefined };
      } catch (e) {
        acc[idx] = { ...product, enriched: null, _ok: false, _err: e.message };
      }
      setResults([...acc]);
    }
    setRunning(false);
    setCurrent(-1);
    return acc;
  };

  const run = async () => {
    setStarted(true);
    // Initialize result slots
    const init = products.map(p => ({ ...p, _ok: false, _err: undefined, _pending: true }));
    setResults(init);
    const batch = products.map((p, i) => ({ product: p, idx: i }));
    const final = await runBatch(batch, init);
    setTimeout(() => onDone(final), 600);
  };

  const retryFailed = async () => {
    const batch = results
      .map((r, i) => ({ product: products[i], idx: i, ok: r._ok }))
      .filter(x => !x.ok);
    const final = await runBatch(batch, results);
    if (final.every(r => r._ok || r._pending === false)) {
      setTimeout(() => onDone(final), 600);
    }
  };

  const pct = products.length
    ? Math.round((results.filter(r => !r._pending).length / products.length) * 100)
    : 0;
  const done = started && !running && results.length === products.length && results.every(r => !r._pending);
  const failedCount = results.filter(r => !r._pending && !r._ok).length;
  const successCount = results.filter(r => r._ok).length;

  return (
    <div className="max-w-md mx-auto text-center">
      <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 ${done && !failedCount ? "bg-green-100" : done && failedCount ? "bg-amber-100" : "bg-indigo-100"}`}>
        {done && !failedCount
          ? <CheckCircle size={32} className="text-green-500" />
          : done && failedCount
            ? <AlertCircle size={32} className="text-amber-500" />
            : <Zap size={32} className="text-indigo-600" />}
      </div>
      <h2 className="text-xl font-bold text-gray-900 mb-1">
        {!started
          ? "Enriquecimento com IA"
          : running
            ? "Processando produtos..."
            : done && !failedCount
              ? "Enriquecimento conclu\u00EDdo!"
              : done
                ? `${failedCount} produto(s) com erro`
                : "Processando..."}
      </h2>
      <p className="text-gray-500 text-sm mb-6">
        {!started ? `A IA vai gerar t\u00EDtulo, descri\u00E7\u00E3o, atributos e tags para ${products.length} produto(s).` : ""}
      </p>

      {!started && (
        <>
          {(rules?.titleTemplate || (rules?.descriptionStyles || []).length > 0 || rules?.additionalInstructions) && (
            <div className="mb-4 p-4 bg-indigo-50 border border-indigo-100 rounded-2xl text-left text-sm space-y-1.5">
              <p className="font-semibold text-indigo-700 text-xs mb-2">\uD83D\uDCCB Regras configuradas</p>
              {rules.aiModel && rules.aiModel !== "gpt-4o" && (
                <p className="text-xs text-indigo-600">\uD83E\uDD16 Modelo: <span className="font-medium">{rules.aiModel}</span></p>
              )}
              {rules.titleTemplate && (
                <p className="text-xs text-indigo-600">\uD83C\uDFF7\uFE0F Padr\u00E3o: <span className="font-mono font-medium">{rules.titleTemplate}</span></p>
              )}
              {(rules.descriptionStyles || []).length > 0 && (
                <p className="text-xs text-indigo-600">\u270D\uFE0F Estilos: <span className="font-medium">{rules.descriptionStyles.join(", ")}</span></p>
              )}
            </div>
          )}
          {!apiKey && (
            <div className="mb-4 p-3 bg-amber-50 border border-amber-200 rounded-xl text-amber-700 text-sm flex items-center gap-2">
              <AlertCircle size={15} /> Configure a chave da OpenAI nas configura\u00E7\u00F5es antes de continuar.
            </div>
          )}
          <button onClick={run} disabled={!apiKey}
            className="px-8 py-3 bg-indigo-600 text-white rounded-2xl font-semibold hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed shadow-md shadow-indigo-200 flex items-center gap-2 mx-auto">
            <Zap size={16} /> Iniciar Enriquecimento
          </button>
        </>
      )}

      {started && (
        <div className="text-left">
          {/* Progress bar */}
          <div className="flex justify-between text-sm text-gray-500 mb-2">
            <span>{successCount} ok \u00B7 {failedCount} erro \u00B7 {results.filter(r => r._pending).length} pendente</span>
            <span className="font-semibold text-indigo-600">{pct}%</span>
          </div>
          <div className="w-full bg-gray-100 rounded-full h-3 mb-5 overflow-hidden">
            <div className="bg-gradient-to-r from-indigo-500 to-purple-500 h-3 rounded-full transition-all duration-500" style={{ width: `${pct}%` }} />
          </div>

          {/* Currently processing */}
          {running && current >= 0 && current < products.length && (
            <div className="mb-4 text-center">
              <p className="text-sm text-gray-600 flex items-center justify-center gap-2">
                <Loader size={14} className="animate-spin text-indigo-500" />
                <span className="font-medium truncate max-w-xs">{products[current]?.produto_fornecedor}</span>
              </p>
              {phase && (
                <p className="text-xs text-indigo-500 font-medium mt-1 flex items-center justify-center gap-1">
                  {phase === "Pesquisando na web..." ? "\uD83D\uDD0D" : "\u2728"} {phase}
                </p>
              )}
            </div>
          )}

          {/* Results list */}
          <div className="space-y-1.5 max-h-60 overflow-y-auto pr-1">
            {results.map((r, i) => (
              <div key={i}>
                <div
                  className={`flex items-center gap-2 px-3 py-2 rounded-xl text-sm cursor-default
                    ${r._pending ? "bg-gray-50 text-gray-400" : r._ok ? "bg-green-50 text-green-700" : "bg-red-50 text-red-700"}`}
                  onClick={() => !r._ok && r._err && setExpandedErr(expandedErr === i ? null : i)}
                >
                  {r._pending
                    ? <Loader size={14} className="shrink-0 opacity-40" />
                    : r._ok
                      ? <CheckCircle size={14} className="shrink-0" />
                      : <XCircle size={14} className="shrink-0 cursor-pointer" />}
                  <span className="flex-1 truncate text-xs">{r.produto_fornecedor}</span>
                  {!r._ok && !r._pending && r._err && (
                    <span className="text-xs opacity-60 shrink-0">{expandedErr === i ? "\u25B2" : "\u25BC"}</span>
                  )}
                </div>
                {/* Full error message, expandable */}
                {expandedErr === i && r._err && (
                  <div className="mt-0.5 mx-1 px-3 py-2 bg-red-50 border border-red-200 rounded-xl text-xs text-red-700 break-all">
                    {r._err}
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Actions when done */}
          {done && failedCount > 0 && (
            <div className="mt-4 flex gap-2 justify-center">
              <button onClick={retryFailed}
                className="px-5 py-2 bg-amber-500 text-white rounded-xl text-sm font-semibold hover:bg-amber-600 flex items-center gap-1.5 shadow-sm">
                <RefreshCw size={14} /> Tentar novamente ({failedCount} falha{failedCount > 1 ? "s" : ""})
              </button>
              {successCount > 0 && (
                <button onClick={() => onDone(results)}
                  className="px-5 py-2 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 flex items-center gap-1.5 shadow-sm">
                  Continuar com {successCount} produto{successCount > 1 ? "s" : ""} <ChevronRight size={14} />
                </button>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// REVIEW STEP
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function ReviewStep({ products, apiKey, onDone }) {
  const [items, setItems] = useState(() =>
    products.map(p => ({ ...p, _approved: false, _imgPrompt: "", _generatedImage: null, _imgUrl: p.link_imagens_drive || "" }))
  );
  const [idx, setIdx] = useState(0);
  const [genLoading, setGenLoading] = useState(false);
  const [genError, setGenError] = useState("");
  const [activeTab, setActiveTab] = useState("content");

  const cur = items[idx];
  const approved = items.filter(i => i._approved);

  const upd = (k, v) => setItems(prev => { const a = [...prev]; a[idx] = { ...a[idx], [k]: v }; return a; });
  const updEnr = (k, v) => setItems(prev => { const a = [...prev]; a[idx] = { ...a[idx], enriched: { ...a[idx].enriched, [k]: v } }; return a; });

  const handleGenImage = async () => {
    if (!cur._imgPrompt.trim()) { setGenError("Descreva a cena antes de gerar."); return; }
    setGenError(""); setGenLoading(true);
    try {
      const url = await generateProductImage(cur.produto_fornecedor, cur.enriched?.descricao || "", cur._imgPrompt, apiKey);
      upd("_generatedImage", url);
    } catch (e) { setGenError(e.message); }
    setGenLoading(false);
  };

  const handleApprove = () => {
    upd("_approved", true);
    if (idx < items.length - 1) setIdx(idx + 1);
  };

  if (!cur) return null;

  return (
    <div>
      {/* Header */}
      <div className="flex items-start justify-between mb-4">
        <div>
          <h2 className="text-xl font-bold text-gray-900">Revis\u00E3o</h2>
          <p className="text-sm text-gray-500">Produto {idx + 1} de {items.length}</p>
        </div>
        <div className="flex items-center gap-2">
          <span className="text-sm text-gray-500">{approved.length} aprovados</span>
          {approved.length > 0 && (
            <button onClick={() => onDone(approved)}
              className="px-4 py-2 bg-green-600 text-white rounded-xl text-sm font-semibold hover:bg-green-700 flex items-center gap-1.5 shadow-sm">
              <Send size={14} /> Exportar {approved.length} produto(s)
            </button>
          )}
        </div>
      </div>

      {/* Dot navigator */}
      <div className="flex gap-1.5 mb-5 flex-wrap">
        {items.map((p, i) => (
          <button key={i} onClick={() => setIdx(i)}
            className={`w-8 h-8 rounded-full text-xs font-bold transition-all border-2 ${
              i === idx ? "bg-indigo-600 text-white border-indigo-400 scale-110"
              : p._approved ? "bg-green-500 text-white border-green-400"
              : "bg-gray-100 text-gray-500 border-transparent hover:border-gray-300"}`}>
            {i + 1}
          </button>
        ))}
      </div>

      {/* Product name + badge */}
      <div className="flex items-center gap-3 mb-5 p-4 bg-gray-50 rounded-2xl">
        <div className="flex-1">
          <p className="font-bold text-gray-900">{cur.produto_fornecedor}</p>
          <p className="text-xs text-gray-500 mt-0.5">{cur.marca} \u00B7 EAN {cur.ean} \u00B7 {cur.categoria_sugerida || "Sem categoria"}</p>
        </div>
        {cur._ok === false && (
          <span className="px-2 py-1 bg-red-100 text-red-700 text-xs rounded-lg font-medium">Falha no enriquecimento</span>
        )}
        {cur._approved && (
          <span className="px-2 py-1 bg-green-100 text-green-700 text-xs rounded-lg font-medium flex items-center gap-1">
            <CheckCircle size={11} /> Aprovado
          </span>
        )}
      </div>

      {/* Tabs */}
      <div className="flex gap-1 mb-5 bg-gray-100 p-1 rounded-xl">
        {[
          { id: "content", label: "Conte\u00FAdo IA", Icon: FileText },
          { id: "image", label: "Imagem Lifestyle", Icon: ImageIcon },
          { id: "data", label: "Dados Originais", Icon: Package },
        ].map(({ id, label, Icon }) => (
          <button key={id} onClick={() => setActiveTab(id)}
            className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg text-sm font-medium transition-all
              ${activeTab === id ? "bg-white shadow text-indigo-700" : "text-gray-500 hover:text-gray-700"}`}>
            <Icon size={14} /> <span className="hidden sm:inline">{label}</span>
          </button>
        ))}
      </div>

      {/* Tab: Content */}
      {activeTab === "content" && (
        <div className="space-y-4">
          {/* Marketplace titles table */}
          {cur.enriched?.titulos && Object.keys(cur.enriched.titulos).length > 0 && (
            <div>
              <label className="block text-xs font-semibold text-gray-600 mb-2">T\u00EDtulos por Marketplace</label>
              <div className="border border-gray-200 rounded-xl overflow-hidden">
                {MARKETPLACES.filter(mp => cur.enriched.titulos[mp.id] !== undefined).map((mp, i) => {
                  const title = cur.enriched.titulos[mp.id] || "";
                  const pct = Math.min(100, Math.round((title.length / mp.limit) * 100));
                  const over = title.length > mp.limit;
                  return (
                    <div key={mp.id} className={`px-3 py-2.5 ${i > 0 ? "border-t border-gray-100" : ""}`}>
                      <div className="flex items-center gap-2 mb-1.5">
                        <span className="text-sm">{mp.icon}</span>
                        <span className="text-xs font-semibold text-gray-600 w-28 shrink-0">{mp.label}</span>
                        <input
                          type="text"
                          value={title}
                          onChange={e => updEnr("titulos", { ...cur.enriched.titulos, [mp.id]: e.target.value })}
                          className={`flex-1 text-xs px-2 py-1 rounded-lg border focus:outline-none focus:ring-1 ${over ? "border-red-300 focus:ring-red-400 bg-red-50" : "border-gray-200 focus:ring-indigo-400"}`}
                        />
                        <span className={`text-xs font-mono w-14 text-right shrink-0 ${over ? "text-red-600 font-bold" : "text-gray-400"}`}>
                          {title.length}/{mp.limit}
                        </span>
                      </div>
                      <div className="ml-[120px] h-1 bg-gray-100 rounded-full overflow-hidden">
                        <div
                          className={`h-1 rounded-full transition-all ${over ? "bg-red-400" : pct > 85 ? "bg-amber-400" : "bg-green-400"}`}
                          style={{ width: `${Math.min(100, pct)}%` }}
                        />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Generic title */}
          <div>
            <label className="block text-xs font-semibold text-gray-600 mb-1.5">T\u00EDtulo Geral</label>
            <input type="text" value={cur.enriched?.titulo_otimizado || ""}
              onChange={e => updEnr("titulo_otimizado", e.target.value)}
              className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            <p className="text-xs text-gray-400 mt-1">{(cur.enriched?.titulo_otimizado || "").length} / 60 caracteres</p>
          </div>

          {/* SKU Interno + CEST + Varia\u00E7\u00F5es */}
          <div>
            <label className="block text-xs font-semibold text-gray-600 mb-1.5">SKU Interno</label>
            <input type="text" value={cur.enriched?.sku_interno || ""}
              onChange={e => updEnr("sku_interno", e.target.value)}
              placeholder="LAV-1200W-LK1305-KALA-127V"
              className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-xs font-semibold text-gray-600 mb-1.5">CEST</label>
              <input type="text" value={cur.enriched?.cest || ""}
                onChange={e => updEnr("cest", e.target.value)}
                placeholder="XX.XXX.XX"
                className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-600 mb-1.5">Varia\u00E7\u00F5es <span className="font-normal text-gray-400">(tipo K)</span></label>
              <input type="text" value={cur.enriched?.variacoes || ""}
                onChange={e => updEnr("variacoes", e.target.value)}
                placeholder="Voltagem: 127V"
                className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
          </div>

          <div>
            <label className="block text-xs font-semibold text-gray-600 mb-1.5">Descri\u00E7\u00E3o Complementar <span className="font-normal text-gray-400">(m\u00E1x 200 chars)</span></label>
            <textarea value={cur.enriched?.descricao_complementar || ""}
              onChange={e => updEnr("descricao_complementar", e.target.value)}
              rows={2}
              className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none" />
            <p className="text-xs text-gray-400 mt-1">{(cur.enriched?.descricao_complementar || "").length} / 200 caracteres</p>
          </div>

          <div>
            <label className="block text-xs font-semibold text-gray-600 mb-1.5">Descri\u00E7\u00E3o (HTML)</label>
            <textarea value={cur.enriched?.descricao || ""} onChange={e => updEnr("descricao", e.target.value)}
              rows={7} className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none" />
          </div>

          {/* SEO fields */}
          <div className="p-4 bg-blue-50 border border-blue-100 rounded-2xl space-y-3">
            <p className="text-xs font-bold text-blue-700 mb-1">\uD83D\uDD0D Campos SEO</p>
            <div>
              <label className="block text-xs font-semibold text-gray-600 mb-1.5">T\u00EDtulo SEO <span className="font-normal text-gray-400">(m\u00E1x 70 chars)</span></label>
              <input type="text" value={cur.enriched?.titulo_seo || ""}
                onChange={e => updEnr("titulo_seo", e.target.value)}
                className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
              <p className="text-xs text-gray-400 mt-1">{(cur.enriched?.titulo_seo || "").length} / 70 caracteres</p>
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-600 mb-1.5">Descri\u00E7\u00E3o SEO <span className="font-normal text-gray-400">(m\u00E1x 160 chars)</span></label>
              <textarea value={cur.enriched?.descricao_seo || ""}
                onChange={e => updEnr("descricao_seo", e.target.value)}
                rows={2}
                className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none" />
              <p className="text-xs text-gray-400 mt-1">{(cur.enriched?.descricao_seo || "").length} / 160 caracteres</p>
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-600 mb-1.5">Palavras-chave SEO</label>
              <input type="text" value={cur.enriched?.palavras_chave_seo || ""}
                onChange={e => updEnr("palavras_chave_seo", e.target.value)}
                placeholder="termo1, termo2, termo3..."
                className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
            </div>
          </div>

          <div>
            <label className="block text-xs font-semibold text-gray-600 mb-2 flex items-center gap-1">
              <Tag size={12} /> Tags
            </label>
            <div className="flex flex-wrap gap-1.5 mb-2">
              {(cur.enriched?.tags || []).map((tag, i) => (
                <span key={i} className="px-2.5 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-medium">{tag}</span>
              ))}
            </div>
            <input type="text" placeholder="tag1, tag2, tag3..."
              value={(cur.enriched?.tags || []).join(", ")}
              onChange={e => updEnr("tags", e.target.value.split(",").map(t => t.trim()).filter(Boolean))}
              className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          {(cur.enriched?.atributos || []).length > 0 && (
            <div>
              <label className="block text-xs font-semibold text-gray-600 mb-2">Atributos T\u00E9cnicos</label>
              <div className="bg-gray-50 rounded-xl overflow-hidden border border-gray-100">
                {(cur.enriched.atributos || []).map((a, i) => (
                  <div key={i} className={`flex text-sm px-4 py-2 ${i % 2 === 0 ? "bg-gray-50" : "bg-white"}`}>
                    <span className="font-medium text-gray-600 w-1/2">{a.nome}</span>
                    <span className="text-gray-800 w-1/2">{a.valor}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Tab: Image */}
      {activeTab === "image" && (
        <div className="space-y-4">
          <div className="p-4 bg-purple-50 rounded-2xl text-xs text-purple-700 border border-purple-100">
            \uD83D\uDCA1 A IA gerar\u00E1 uma fotografia lifestyle profissional baseada no nome do produto e no contexto que voc\u00EA descrever abaixo.
          </div>

          <div>
            <label className="block text-xs font-semibold text-gray-600 mb-1.5">URL da imagem do produto <span className="font-normal text-gray-400">(refer\u00EAncia visual)</span></label>
            <input type="url" value={cur._imgUrl} onChange={e => upd("_imgUrl", e.target.value)}
              placeholder="https://drive.google.com/... ou link direto da imagem"
              className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500" />
          </div>

          <div>
            <label className="block text-xs font-semibold text-gray-600 mb-1.5">Descreva a cena / contexto de uso</label>
            <textarea value={cur._imgPrompt} onChange={e => upd("_imgPrompt", e.target.value)} rows={4}
              placeholder={`Ex: "${cur.produto_fornecedor} sendo utilizado por um profissional para furar uma parede de alvenaria, ambiente de obra residencial, luz natural intensa, fundo desfocado..."`}
              className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 resize-none" />
          </div>

          {genError && (
            <div className="p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-xs flex items-center gap-2">
              <XCircle size={13} /> {genError}
            </div>
          )}

          <button onClick={handleGenImage} disabled={genLoading || !apiKey}
            className="w-full py-3 bg-purple-600 text-white rounded-2xl text-sm font-semibold hover:bg-purple-700 disabled:opacity-40 flex items-center justify-center gap-2 shadow-md shadow-purple-200">
            {genLoading ? <><Loader size={14} className="animate-spin" /> Gerando imagem...</> : <><ImageIcon size={14} /> Gerar imagem lifestyle</>}
          </button>

          {cur._generatedImage && (
            <div className="relative rounded-2xl overflow-hidden border border-gray-200">
              <img src={cur._generatedImage} alt="Imagem gerada" className="w-full object-cover max-h-72" />
              <div className="absolute bottom-2 right-2 flex gap-2">
                <a href={cur._generatedImage} target="_blank" rel="noreferrer"
                  className="px-2.5 py-1 bg-white/90 rounded-lg text-xs font-medium hover:bg-white shadow-sm">
                  Abrir \u2197
                </a>
                <button onClick={handleGenImage}
                  className="px-2.5 py-1 bg-white/90 rounded-lg text-xs font-medium hover:bg-white shadow-sm flex items-center gap-1">
                  <RefreshCw size={11} /> Regerar
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Tab: Original data */}
      {activeTab === "data" && (
        <div className="bg-gray-50 rounded-2xl overflow-hidden border border-gray-100">
          {[
            ["EAN", cur.ean], ["C\u00F3digo fornecedor", cur.codigo_fornecedor], ["Marca", cur.marca],
            ["Fornecedor", cur.fornecedor], ["Origem", cur.origem], ["NCM", cur.ncm],
            ["Classifica\u00E7\u00E3o Fiscal", cur.classificacao_fiscal], ["Pre\u00E7o de venda", cur.preco_venda ? `R$ ${cur.preco_venda}` : "\u2014"],
            ["Unidade", cur.unidade], ["Garantia", cur.garantia ? `${cur.garantia} meses` : "\u2014"],
            ["Peso", cur.peso ? `${cur.peso} kg` : "\u2014"],
            ["Dimens\u00F5es (A\u00D7L\u00D7C)", cur.altura && cur.largura && cur.comprimento ? `${cur.altura} \u00D7 ${cur.largura} \u00D7 ${cur.comprimento} cm` : "\u2014"],
            ["Categoria sugerida", cur.categoria_sugerida], ["Observa\u00E7\u00F5es", cur.observacoes],
          ].map(([label, value], i) => (
            <div key={i} className={`flex text-sm px-4 py-2.5 ${i % 2 === 0 ? "" : "bg-white"}`}>
              <span className="font-medium text-gray-500 w-1/2 shrink-0">{label}</span>
              <span className="text-gray-800 break-all">{value || "\u2014"}</span>
            </div>
          ))}
        </div>
      )}

      {/* Navigation + Approve */}
      <div className="flex items-center justify-between mt-6 gap-3">
        <button onClick={() => setIdx(Math.max(0, idx - 1))} disabled={idx === 0}
          className="px-4 py-2.5 border border-gray-300 rounded-xl text-sm font-medium hover:bg-gray-50 disabled:opacity-30 flex items-center gap-1">
          <ChevronLeft size={16} /> Anterior
        </button>

        <button onClick={handleApprove}
          className={`flex-1 py-2.5 rounded-xl text-sm font-semibold flex items-center justify-center gap-1.5 transition-all ${
            cur._approved ? "bg-green-100 text-green-700 border border-green-300 hover:bg-green-200" : "bg-indigo-600 text-white hover:bg-indigo-700 shadow-md shadow-indigo-200"
          }`}>
          <CheckCircle size={15} />
          {cur._approved ? "Aprovado \u2713" : "Aprovar produto"}
        </button>

        <button onClick={() => setIdx(Math.min(items.length - 1, idx + 1))} disabled={idx === items.length - 1}
          className="px-4 py-2.5 border border-gray-300 rounded-xl text-sm font-medium hover:bg-gray-50 disabled:opacity-30 flex items-center gap-1">
          Pr\u00F3ximo <ChevronRight size={16} />
        </button>
      </div>
    </div>
  );
}

// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// SYNC STEP (CSV export primary + API secondary)
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function SyncStep({ products, tinyToken, onRestart }) {
  const [exported, setExported] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [syncResults, setSyncResults] = useState([]);
  const [syncDone, setSyncDone] = useState(false);

  const handleExportCSV = () => {
    const resolved = resolveParentChild(products);
    const csv = buildTinyCSV(resolved);
    const date = new Date().toISOString().slice(0, 10);
    downloadCSV(csv, `tiny-produtos-${date}.csv`);
    setExported(true);
  };

  const handleSyncAPI = async () => {
    if (!tinyToken) return;
    setSyncing(true);
    const resolved = resolveParentChild(products);
    const acc = [];
    for (const p of resolved) {
      try {
        await sendToTiny(p, tinyToken);
        acc.push({ ...p, _syncOk: true });
      } catch (e) {
        acc.push({ ...p, _syncOk: false, _syncErr: e.message });
      }
      setSyncResults([...acc]);
    }
    setSyncing(false);
    setSyncDone(true);
  };

  const ok = syncResults.filter(r => r._syncOk).length;
  const fail = syncResults.filter(r => !r._syncOk).length;

  return (
    <div className="max-w-lg mx-auto">
      {/* Header */}
      <div className="text-center mb-6">
        <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 ${exported || syncDone ? "bg-green-100" : "bg-indigo-100"}`}>
          {exported || syncDone ? <CheckCircle size={32} className="text-green-500" /> : <Send size={32} className="text-indigo-600" />}
        </div>
        <h2 className="text-xl font-bold text-gray-900">Exportar para Tiny ERP</h2>
        <p className="text-sm text-gray-500 mt-1">{products.length} produto(s) aprovado(s) prontos</p>
      </div>

      {/* PRIMARY: CSV Export */}
      <div className="p-5 bg-white border-2 border-indigo-200 rounded-2xl mb-4 space-y-3">
        <div className="flex items-start gap-3">
          <div className="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center shrink-0">
            <FileText size={20} className="text-indigo-600" />
          </div>
          <div className="flex-1">
            <div className="flex items-center gap-2">
              <h3 className="font-semibold text-gray-900 text-sm">Exportar CSV</h3>
              <span className="px-2 py-0.5 bg-indigo-100 text-indigo-700 text-xs rounded-full font-medium">Recomendado</span>
            </div>
            <p className="text-xs text-gray-500 mt-0.5">Gera planilha no formato padr\u00E3o Tiny ERP para importa\u00E7\u00E3o manual.</p>
          </div>
        </div>
        {exported && (
          <div className="p-3 bg-green-50 border border-green-200 rounded-xl text-green-700 text-xs flex items-center gap-2">
            <CheckCircle size={13} /> CSV exportado! Importe em: <span className="font-medium">Tiny \u2192 Produtos \u2192 Importar Planilha</span>
          </div>
        )}
        <button onClick={handleExportCSV}
          className="w-full py-3 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 flex items-center justify-center gap-2 shadow-md shadow-indigo-200 transition-colors">
          <FileText size={16} />
          {exported ? "Exportar novamente" : `Baixar CSV (${products.length} produto${products.length !== 1 ? "s" : ""})`}
        </button>
      </div>

      {/* SECONDARY: API Sync */}
      <div className="p-5 bg-white border border-gray-200 rounded-2xl mb-5 space-y-3">
        <div className="flex items-start gap-3">
          <div className="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center shrink-0">
            <Send size={18} className="text-gray-500" />
          </div>
          <div>
            <h3 className="font-semibold text-gray-700 text-sm">Envio via API <span className="text-gray-400 font-normal">(Avan\u00E7ado)</span></h3>
            <p className="text-xs text-gray-400 mt-0.5">Cadastra diretamente no Tiny pela API v3. Requer token configurado.</p>
          </div>
        </div>
        {!tinyToken && (
          <div className="p-2.5 bg-amber-50 border border-amber-200 rounded-xl text-amber-700 text-xs flex items-center gap-2">
            <AlertCircle size={12} /> Configure o token do Tiny nas configura\u00E7\u00F5es.
          </div>
        )}
        <div className="p-2.5 bg-blue-50 border border-blue-100 rounded-xl text-blue-700 text-xs">
          \u2139\uFE0F A API do Tiny pode bloquear requisi\u00E7\u00F5es do navegador (CORS). Para produ\u00E7\u00E3o use um proxy server.
        </div>
        {!syncDone && (
          <button onClick={handleSyncAPI} disabled={!tinyToken || syncing}
            className="w-full py-2.5 border border-gray-300 text-gray-700 rounded-xl text-sm font-medium hover:bg-gray-50 disabled:opacity-40 flex items-center justify-center gap-2 transition-colors">
            {syncing ? <><Loader size={14} className="animate-spin" /> Enviando...</> : <><Send size={14} /> Enviar via API</>}
          </button>
        )}
        {(syncing || syncResults.length > 0) && (
          <div className="space-y-1 max-h-40 overflow-y-auto">
            {syncResults.map((r, i) => (
              <div key={i} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs ${r._syncOk ? "bg-green-50 text-green-700" : "bg-red-50 text-red-700"}`}>
                {r._syncOk ? <CheckCircle size={12} /> : <XCircle size={12} />}
                <span className="flex-1 truncate">{r.produto_fornecedor}</span>
                {!r._syncOk && <span className="opacity-70 truncate max-w-[120px]">{r._syncErr}</span>}
              </div>
            ))}
          </div>
        )}
        {syncDone && (
          <div className="grid grid-cols-2 gap-2">
            <div className="p-3 bg-green-50 rounded-xl text-center border border-green-100">
              <div className="text-2xl font-bold text-green-600">{ok}</div>
              <div className="text-xs text-green-700 font-medium mt-0.5">Cadastrados</div>
            </div>
            <div className={`p-3 rounded-xl text-center border ${fail > 0 ? "bg-red-50 border-red-100" : "bg-gray-50 border-gray-100"}`}>
              <div className={`text-2xl font-bold ${fail > 0 ? "text-red-600" : "text-gray-400"}`}>{fail}</div>
              <div className={`text-xs font-medium mt-0.5 ${fail > 0 ? "text-red-700" : "text-gray-400"}`}>Com erro</div>
            </div>
          </div>
        )}
      </div>

      <button onClick={onRestart}
        className="w-full py-3 border border-gray-300 rounded-2xl text-sm font-medium hover:bg-gray-50 flex items-center justify-center gap-2">
        <Home size={15} /> Novo cadastro
      </button>
    </div>
  );
}

// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// MAIN APP
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function App() {
  const [step, setStep] = useState("upload");
  const [apiKeys, setApiKeys] = useState({ openai: "", tiny: "" });
  const [enrichmentRules, setEnrichmentRules] = useState({
    aiModel: "gpt-4o",
    titleTemplate: "",
    descriptionStyles: [],
    additionalInstructions: "",
    activeMarketplaces: MARKETPLACES.map(m => m.id),
  });
  const [showSettings, setShowSettings] = useState(false);
  const [raw, setRaw] = useState([]);
  const [columnMap, setColumnMap] = useState({});
  const [valid, setValid] = useState([]);
  const [enriched, setEnriched] = useState([]);
  const [approved, setApproved] = useState([]);

  const restart = () => { setStep("upload"); setRaw([]); setColumnMap({}); setValid([]); setEnriched([]); setApproved([]); };
  const keysConfigured = apiKeys.openai && apiKeys.tiny;
  const rulesConfigured = enrichmentRules.titleTemplate || enrichmentRules.descriptionStyles.length > 0;

  return (
    <div className="min-h-screen bg-slate-50">
      {/* Header */}
      <header className="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center shadow-sm">
              <Package size={18} className="text-white" />
            </div>
            <div>
              <h1 className="font-bold text-gray-900 text-sm leading-none">Machine PADS</h1>
              <p className="text-xs text-gray-400 leading-none mt-0.5">Cadastro Massivo</p>
            </div>
          </div>
          <button onClick={() => setShowSettings(true)}
            className="flex items-center gap-2 px-3 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-xl transition-colors">
            <Settings size={16} />
            <span className="hidden sm:inline font-medium">Configura\u00E7\u00F5es</span>
            {!keysConfigured && <span className="w-2 h-2 bg-amber-500 rounded-full animate-pulse" />}
            {rulesConfigured && <span className="w-2 h-2 bg-indigo-500 rounded-full" title="Regras de IA configuradas" />}
          </button>
        </div>
      </header>

      {/* Main */}
      <main className="max-w-4xl mx-auto px-4 sm:px-6 py-8">
        <StepBar current={step} />

        {step === "upload" && (
          <UploadStep onUpload={(rows, cm) => { setRaw(rows); setColumnMap(cm || {}); setStep("validation"); }} />
        )}
        {step === "validation" && (
          <ValidationStep raw={raw} columnMap={columnMap} onProceed={v => { setValid(v); setStep("enrichment"); }} onBack={restart} />
        )}
        {step === "enrichment" && (
          <EnrichmentStep products={valid} apiKey={apiKeys.openai} rules={enrichmentRules} onDone={e => { setEnriched(resolveParentChild(e)); setStep("review"); }} />
        )}
        {step === "review" && (
          <ReviewStep products={enriched} apiKey={apiKeys.openai} onDone={a => { setApproved(a); setStep("sync"); }} />
        )}
        {step === "sync" && (
          <SyncStep products={approved} tinyToken={apiKeys.tiny} onRestart={restart} />
        )}
      </main>

      {showSettings && (
        <SettingsModal
          keys={apiKeys} setKeys={setApiKeys}
          rules={enrichmentRules} setRules={setEnrichmentRules}
          onClose={() => setShowSettings(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
</body>
</html>
